<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V4.1</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/192x192icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        
        /* --- STARTSEITE --- */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; }
        #logo-container img { width: 750px; max-width: 70vw; filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.8)); }
        
        .left-menu { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .side-btn-left { background: #39d353; padding: 40px 10px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; width: 50px; text-align: center; border: none; transition: 0.3s; }
        #regBar { background: #ffd600; padding: 30px 10px; font-size: 16px; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 35px; width: 420px; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 40px rgba(255,0,0,0.4); }
        .modal-box h1 { color: #ff3131; text-decoration: underline; margin-bottom: 20px; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; }
        
        /* --- DASHBOARD --- */
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; padding: 20px; box-sizing: border-box; }
        #bg-bull { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 700px; opacity: 0.25; z-index: 0; pointer-events: none; }
        
        .panel-container { display: grid; grid-template-columns: 300px 1fr 300px; grid-template-rows: 1fr 1fr; height: 100%; gap: 30px; position: relative; z-index: 10; }
        .panel { background: rgba(20, 20, 20, 0.9); border: 2px solid #333; padding: 20px; border-radius: 10px; display: none; }
        .panel h2 { color: #ff3131; margin-top: 0; text-decoration: underline; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .panel button { width: 100%; margin: 10px 0; background: #39d353; border: none; padding: 12px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 16px; }
        
        /* Positionen der Panels */
        #personal { grid-column: 1; grid-row: 1; }
        #blacklist { grid-column: 1; grid-row: 2; }
        #admin { grid-column: 3; grid-row: 1; }
        #elo { grid-column: 3; grid-row: 2; }
        #blacklistAdmin { grid-column: 2; grid-row: 2; align-self: end; }

        #allianz-chat-btn { position: fixed; bottom: 30px; right: 30px; background: #ff8c00; color: black; padding: 15px 40px; font-size: 24px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-family: 'Almendra'; z-index: 100; }

        /* --- CHAT HUB --- */
        #chat-hub { display: none; position: fixed; top: 5%; left: 5%; width: 90%; height: 85%; background: #111; border: 2px solid #444; z-index: 6000; box-shadow: 0 0 100px black; }
    </style>
</head>
<body>

<div id="start">
    <div class="left-menu">
        <button class="side-btn-left" onclick="openM('pinModal')">LOGIN</button>
        <button class="side-btn-left" id="regBar" onclick="openM('regModal')">REGISTRIEREN</button>
    </div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div class="login-btn-row">
            <button class="logbtn btn-green" id="finalLoginBtn">Anmelden</button>
            <button class="logbtn btn-red" onclick="closeM('pinModal')">Abbruch</button>
        </div>
    </div>
</div>

<div id="regModal" class="modal-overlay">
    <div class="modal-box">
        <h1>REKRUTIERUNG</h1>
        <input type="text" id="regName" placeholder="Spielername">
        <input type="password" id="regPin1" placeholder="PIN wählen">
        <input type="password" id="regPin2" placeholder="PIN wiederholen">
        <input type="number" id="regAge" placeholder="Alter">
        <input type="text" id="regSource" placeholder="Wie hast du uns gefunden?">
        <div class="login-btn-row">
            <button class="logbtn btn-yellow" onclick="registerUser()">Abschicken</button>
            <button class="logbtn btn-red" onclick="closeM('regModal')">Abbruch</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div style="position: absolute; top: 20px; right: 20px; z-index: 200;">
        <span id="userNameDisplay" style="color: #ff3131; font-size: 20px; margin-right: 15px;"></span>
        <button onclick="location.reload()" style="background: red; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">LOGOUT</button>
    </div>

    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel-container">
        <div class="panel" id="personal">
            <h2>Persönlich</h2>
            <button onclick="toggleChat()">SUPPORT / CHAT</button>
            <button>Meine Stats</button>
        </div>

        <div class="panel" id="blacklist">
            <h2>Black Liste</h2>
            <button>Suchen</button>
        </div>

        <div class="panel" id="blacklistAdmin">
            <h2>Black Liste Pflege</h2>
            <button>Eintrag bearbeiten</button>
        </div>

        <div class="panel" id="admin">
            <h2>Admin</h2>
            <button>User-Verwaltung</button>
        </div>

        <div class="panel" id="elo">
            <h2>Elo Bereich</h2>
            <button>Einheiten-Rechner</button>
        </div>
    </div>

    <button id="allianz-chat-btn" onclick="toggleChat()">ALLIANZ CHAT</button>
</div>

<div id="chat-hub">
    <div style="display: flex; height: 100%;">
        <div style="width: 250px; background: #1a1a1a; padding: 15px; border-right: 2px solid #333;">
            <h3 style="color: #ff3131;">KANÄLE</h3>
            <div style="color: #39d353; padding: 10px; background: #222; margin-bottom: 5px;"># Plauderecke</div>
            <div style="padding: 10px;"># Karten-Chat</div>
        </div>
        <div style="flex: 1; display: flex; flex-direction: column;">
            <div id="chat-msgs" style="flex: 1; padding: 20px; overflow-y: auto;">
                <p><i>Lade Chat-Verlauf...</i></p>
            </div>
            <div style="padding: 15px; background: #222; display: flex;">
                <input type="text" style="flex: 1; background: #000; border: 1px solid #444; color: #39d353; padding: 10px;">
                <button style="background: #39d353; border: none; padding: 10px 20px; margin-left: 10px;">SENDEN</button>
            </div>
        </div>
    </div>
    <button onclick="toggleChat()" style="position: absolute; top: -15px; right: -15px; background: red; color: white; border-radius: 50%; width: 40px; height: 40px; border: none; cursor: pointer;">X</button>
</div>

<script>
    // Hier kommen deine Webhook URLs und die Google Script URL rein
    const SHEET_URL = "DEINE_SCRIPT_URL"; 
    let allUsers = [];

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }
    function toggleChat() { 
        const c = document.getElementById('chat-hub');
        c.style.display = (c.style.display === 'block') ? 'none' : 'block';
    }

    async function registerUser() {
        const p1 = document.getElementById('regPin1').value;
        const p2 = document.getElementById('regPin2').value;
        const name = document.getElementById('regName').value;

        if (p1 !== p2) { alert("PINs stimmen nicht überein!"); return; }
        if (!name || !p1) { alert("Name und PIN sind Pflicht!"); return; }

        alert("Registrierung abgeschickt! Support wird informiert.");
        closeM('regModal');
    }

    // Login Logik (Beispielhaft für deine Tabelle)
    document.getElementById('finalLoginBtn').onclick = function() {
        const user = document.getElementById('nameInput').value;
        document.getElementById('start').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('userNameDisplay').innerText = user + " (Admin)";
        
        // Panels anzeigen (je nach Rolle)
        document.getElementById('personal').style.display = 'block';
        document.getElementById('blacklist').style.display = 'block';
        document.getElementById('blacklistAdmin').style.display = 'block';
        document.getElementById('admin').style.display = 'block';
        document.getElementById('elo').style.display = 'block';
    };
</script>
</body>
</html>
