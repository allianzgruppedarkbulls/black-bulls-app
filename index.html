<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V8.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Beibehalten des bewährten V8.6 Designs */
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        #loginBar { position: absolute; left: 0; top: 35%; transform: translateY(-50%); background: #39d353; padding: 30px 5px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        #regBar { position: absolute; left: 0; top: 65%; transform: translateY(-50%); background: #ffd600; padding: 25px 5px; font-size: 14px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .info-btn { padding: 15px 5px; font-size: 15px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 10px 0 0 10px; width: 40px; text-align: center; color: black; min-height: 100px; }
        
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .dark-modal { background: #1a1a1a; padding: 30px; width: 450px; max-width: 90vw; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 50px rgba(255,0,0,0.4); }
        .dark-modal input, .dark-modal textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; outline: none; border-radius: 4px; }
        
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; background: black; }
        #bg-bull { position: fixed; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.4; pointer-events: none; }
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; z-index: 100; background: rgba(0,0,0,0.8); box-sizing: border-box;}
        
        .panel { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; }

        /* Blacklist Modal */
        .bl-box { width: 95%; max-width: 1200px; background: #0c0c0c; border: 1px solid #333; padding: 30px; border-radius: 15px; }
        .bl-header { color: #ff0000; font-size: 50px; text-align: center; margin-bottom: 30px; text-decoration: underline; }
        .bl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .story-box { background: #000; border: 1px solid #333; padding: 20px; min-height: 150px; color: #39d353; font-size: 22px; border-radius: 5px; }

        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 40px; top: 80px; }
            #blacklistPanel { left: 40px; top: 380px; }
            #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
            #admin { right: 40px; top: 120px; width: 260px; }
            #elo { right: 40px; top: 420px; width: 260px; }
        }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('loginModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="document.getElementById('regModal').style.display='flex'">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button class="info-btn" id="btn-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="info-btn" style="background:#5b5bff; color:white;">HISTORIES</button>
        <button class="info-btn" style="background:#00cfd1;" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="regModal" class="modal-overlay">
    <div class="dark-modal">
        <h1>Allianz Bewerbung</h1>
        <input type="text" id="regName" placeholder="Dein Name...">
        <input type="number" id="regAge" placeholder="Dein Alter...">
        <textarea id="regText" placeholder="Warum willst du zu uns?" style="height:100px; width:100%; background:black; color:#39d353; border:1px solid #444; font-family:'Almendra'; font-size:18px; padding:10px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="sendBewerbung()" style="flex:1; background:#ffd600; border:none; padding:15px; font-family:'Almendra'; font-weight:bold; cursor:pointer;">Abschicken</button>
            <button onclick="document.getElementById('regModal').style.display='none'" style="flex:1; background:#d50000; color:white; border:none; padding:15px; cursor:pointer;">Abbruch</button>
        </div>
    </div>
</div>

<div id="supportModal" class="modal-overlay">
    <div class="dark-modal">
        <h1>Support Anfrage</h1>
        <p>Ein Ticket wird im Discord erstellt.</p>
        <textarea id="supportText" placeholder="Wie können wir dir helfen?" style="height:100px; width:100%; background:black; color:#39d353; border:1px solid #444; font-family:'Almendra'; font-size:18px; padding:10px;"></textarea>
        <div style="display:flex; gap:10px;">
            <button onclick="sendSupport()" style="flex:1; background:#39d353; border:none; padding:15px; font-family:'Almendra'; font-weight:bold; cursor:pointer;">Ticket öffnen</button>
            <button onclick="document.getElementById('supportModal').style.display='none'" style="flex:1; background:#d50000; color:white; border:none; padding:15px; cursor:pointer;">Abbruch</button>
        </div>
    </div>
</div>

<div id="loginModal" class="modal-overlay">
    <div class="dark-modal">
        <h1>Anmeldung</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div style="display:flex; gap:10px;">
            <button onclick="doLogin()" style="flex:1; background:#39d353; border:none; padding:15px; font-family:'Almendra'; font-weight:bold; cursor:pointer;">Anmelden</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="flex:1; background:#d50000; color:white; border:none; padding:15px; cursor:pointer;">Abbruch</button>
        </div>
    </div>
</div>

<div id="blacklistModal" class="modal-overlay">
    <div class="bl-box">
        <div class="bl-header">DARK BULLS BLACK LISTE</div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input list="playerList" id="blSearchInput" placeholder="Spieler auswählen..." style="flex:1; background:black; color:#39d353; border:1px solid #444; padding:10px; font-family:'Almendra'; font-size:20px;">
            <datalist id="playerList"></datalist>
            <button onclick="loadBlacklistPlayer()" style="background:#39d353; border:none; padding:10px 30px; font-family:'Almendra'; font-weight:bold; cursor:pointer;">Laden</button>
        </div>
        <div class="bl-grid">
            <div><p>ID: <span id="outID"></span></p><p>Name: <span id="outName"></span></p><p>Allianz: <span id="outAllianz"></span></p></div>
            <div><p>Verstoß: <span id="outVerstoss"></span></p><p>Punkte: <span id="outPunkte"></span></p></div>
            <div><p>Datum: <span id="outDateEvent"></span></p><p>Fall: <span id="outFall"></span></p></div>
        </div>
        <div style="color:#ffbd00; font-size:20px; margin-top:20px;">Beschreibung:</div>
        <div id="outStory" class="story-box"></div>
        <div style="text-align:center; margin-top:30px;">
            <button onclick="document.getElementById('blacklistModal').style.display='none'" style="background:#ffbd00; border:none; padding:15px 50px; font-family:'Almendra'; font-weight:bold; cursor:pointer;">ZURÜCK</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:15px; border-radius:5px;">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button onclick="document.getElementById('supportModal').style.display='flex'">SUPPORT TICKET</button>
        <button>Statistiken</button>
    </div>
    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button onclick="alert('Vorspeicher-Meldung folgt')">Sp. Melden</button>
        <button onclick="openBlacklist()">Anschauen</button>
    </div>
    <div class="panel" id="blacklistAdmin">
        <h2>Pflege Admin</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <button>Gemeldete</button><button>Pflege</button>
            <button>Eintragen</button><button>Vollansicht</button>
        </div>
    </div>
    <div class="panel" id="admin"><h2>Admin</h2><button>User-Verwaltung</button></div>
    <div class="panel" id="elo"><h2>Elo Bereich</h2><button>Rechner</button></div>
</div>

<script>
    const WEBHOOK_BEWERBUNG = "https://discord.com/api/webhooks/1502735246335021267/fpxXtWr5QgSny6rfJzGHKnhYskehC9vDMEl3CvUzjgbBOuKBd8KGzUhCRfvd2KmWcnND";
    const WEBHOOK_SUPPORT = "https://discord.com/api/webhooks/1502735504997744741/kK6SCl_DQtW0TCfuB5epCbTueMcp4COyETyea0J5bM68EOV8EHQoxPzq4gp1_iuh_444";
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';
    const GID_BLACKLIST = '1767725514';

    let users = []; let blacklistData = [];

    async function loadData() {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx:out:csv&gid=${GID_USERS}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        users = rows.map(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
            return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
        });
    }

    async function sendBewerbung() {
        const name = document.getElementById("regName").value;
        const age = document.getElementById("regAge").value;
        const text = document.getElementById("regText").value;
        if(!name || !age) return alert("Bitte Name und Alter angeben!");
        
        const payload = {
            content: "🚨 **NEUE ALLIANZ-BEWERBUNG** 🚨",
            embeds: [{
                title: "Bewerber Details",
                color: 16768512, // Gold
                fields: [
                    { name: "Name", value: name, inline: true },
                    { name: "Alter", value: age, inline: true },
                    { name: "Nachricht", value: text }
                ]
            }]
        };
        await fetch(WEBHOOK_BEWERBUNG, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
        alert("Bewerbung wurde an Discord gesendet!");
        document.getElementById("regModal").style.display = "none";
    }

    async function sendSupport() {
        const user = document.getElementById("userNameDisplay").innerText;
        const text = document.getElementById("supportText").value;
        if(!text) return alert("Bitte beschreibe dein Problem!");

        const payload = {
            content: "🛠️ **NEUES SUPPORT-TICKET** 🛠️",
            embeds: [{
                title: "Support Anfrage",
                color: 3789651, // Grün
                fields: [
                    { name: "Von User", value: user, inline: true },
                    { name: "Anliegen", value: text }
                ]
            }]
        };
        await fetch(WEBHOOK_SUPPORT, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
        alert("Support-Anfrage wurde an Discord gesendet!");
        document.getElementById("supportModal").style.display = "none";
    }

    function doLogin() {
        const n = document.getElementById("nameInput").value.trim().toLowerCase();
        const p = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);
        if (u) {
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;
            setTimeout(() => {
                document.querySelectorAll('.panel').forEach((panel, index) => {
                    if (u.role === "Admin" || panel.id === "personal" || (panel.id === "blacklistPanel" && u.role !== "Gast")) {
                        panel.style.display = "block";
                        setTimeout(() => panel.classList.add('visible'), index * 120);
                    }
                });
            }, 500);
        } else { alert("Login falsch!"); }
    }

    async function openBlacklist() {
        document.getElementById('blacklistModal').style.display = 'flex';
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_BLACKLIST}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const listEl = document.getElementById('playerList');
        listEl.innerHTML = ""; blacklistData = [];
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
            if(c[1]) {
                blacklistData.push(c);
                let opt = document.createElement('option');
                opt.value = c[1] + " | " + c[2];
                listEl.appendChild(opt);
            }
        });
    }

    function loadBlacklistPlayer() {
        const search = document.getElementById('blSearchInput').value.split(" | ")[0];
        const p = blacklistData.find(row => row[1] === search);
        if(p) {
            document.getElementById('outID').innerText = p[1];
            document.getElementById('outName').innerText = p[2];
            document.getElementById('outAllianz').innerText = p[5];
            document.getElementById('outVerstoss').innerText = p[6];
            document.getElementById('outFall').innerText = p[12];
            document.getElementById('outStory').innerText = p[13];
            document.getElementById('outDateEvent').innerText = p[14];
            document.getElementById('outPunkte').innerText = p[16];
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
