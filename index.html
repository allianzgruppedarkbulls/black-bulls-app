<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Almendra', serif;
            background: black;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* STARTSEITE */
        #start {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #loginBar {
            position: absolute;
            top: 40px;
            background: #39d353;
            padding: 12px 60px;
            font-size: 24px;
            font-weight: bold;
            color: black;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 211, 83, 0.4);
        }

        #logo-container img {
            width: 750px;
            max-width: 85vw;
            filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.5));
        }

        /* DASHBOARD LAYOUT */
        #dashboard {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
        }

        /* LOGO IN DER MITTE (VERGRÖSSERT) */
        #bg-bull {
            position: absolute;
            left: 50%;
            top: 45%; /* Etwas höher geschoben für Platz unten */
            transform: translate(-50%, -50%);
            width: 850px; /* Hier richtig groß gezogen */
            z-index: 1;
            filter: drop-shadow(0 0 40px rgba(255, 0, 0, 0.4));
        }

        /* TOP BAR MIT LOGOUT */
        #top-bar {
            position: absolute;
            top: 20px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        #userInfo {
            font-size: 24px;
            color: #ff3131;
        }

        #logout-btn {
            background: #d50000;
            color: white;
            border: none;
            padding: 8px 25px;
            font-family: 'Almendra', serif;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* PANEL DESIGN */
        .panel {
            position: absolute;
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            padding: 15px;
            z-index: 10;
        }

        .panel h2 {
            color: #ff3131;
            margin: 0 0 15px 0;
            font-size: 26px;
            text-decoration: underline;
        }

        .panel button {
            display: block;
            width: 100%;
            margin: 8px 0;
            background: #39d353;
            border: none;
            padding: 10px;
            font-family: 'Almendra', serif;
            font-weight: bold;
            font-size: 18px;
            color: black;
            cursor: pointer;
        }

        /* POSITIONEN LINKS */
        #personal { left: 40px; top: 40px; width: 240px; }
        #blacklist { left: 40px; top: 380px; width: 240px; }
        #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
        #blacklistAdmin .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* POSITIONEN RECHTS (Elo unter Admin) */
        #admin { right: 40px; top: 120px; width: 260px; }
        #elo { right: 40px; top: 380px; width: 260px; } /* Elo sitzt jetzt unter Admin */

        #chat-btn {
            position: absolute;
            right: 40px;
            bottom: 40px;
            background: #ff8c00;
            padding: 15px 60px;
            font-size: 28px;
            font-weight: bold;
            color: black;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        /* LOGIN MODAL */
        #pinModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            justify-content: center;
            align-items: center;
        }

        #pinBox {
            background: #1a1a1a;
            padding: 40px;
            width: 350px;
            border: 2px solid #333;
            text-align: center;
        }
        
        #pinBox input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #000;
            color: #39d353;
            border: 1px solid #444;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="openLogin()">LOGIN</div>
    <div id="logo-container">
        <img src="bulls_start.jpg">
    </div>
</div>

<div id="pinModal">
    <div id="pinBox">
        <h1 style="color:#ff3131">ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name">
        <input type="password" id="pinInput" placeholder="PIN">
        <div style="display: flex; gap: 10px;">
            <button onclick="login()" style="background:#39d353; flex:2; padding:10px; border:none; cursor:pointer; font-weight:bold;">LOGIN</button>
            <button onclick="closeLogin()" style="background:#d50000; flex:1; color:white; border:none; cursor:pointer;">X</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div id="userInfo">Angemeldet als: <span id="userRole"></span></div>
        <button id="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <img src="bulls_dashboard.jpg" id="bg-bull">
    
    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button>Pin ändern</button>
        <button>Statistiken</button>
        <button>Tipps</button>
    </div>

    <div class="panel" id="blacklist">
        <h2>Black Liste</h2>
        <button>Sp. Melden</button>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Black Liste Pflege</h2>
        <div class="grid">
            <button style="font-size: 14px;">Gemeldete Spieler</button>
            <button>Pflege</button>
            <button>Eintragen</button>
            <button>Ansicht</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button>Einstellungen</button>
        <button>Statistiken</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
        <button>Einheiten Rechner</button>
    </div>

    <button id="chat-btn">CHAT</button>
</div>

<script>
    let users = [
        { name: "Admin", pin: "1234", role: "Admin" },
        { name: "Gast", pin: "0000", role: "Gast" }
    ];

    function openLogin() { document.getElementById("pinModal").style.display = "flex"; }
    function closeLogin() { document.getElementById("pinModal").style.display = "none"; }
    
    function login() {
        let name = document.getElementById("nameInput").value;
        let pin = document.getElementById("pinInput").value;
        let user = users.find(u => u.name === name && u.pin === pin);

        if (user) {
            document.getElementById("start").style.display = "none";
            closeLogin();
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userRole").innerText = user.role;
            if (user.role !== "Admin") document.getElementById("admin").style.display = "none";
        } else {
            alert("Daten falsch!");
        }
    }

    function logout() {
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("start").style.display = "flex";
        document.getElementById("nameInput").value = "";
        document.getElementById("pinInput").value = "";
    }
</script>

</body>
</html>
