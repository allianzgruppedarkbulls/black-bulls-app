<!-- =========================
     PLAYER WINDOW (FULL SYSTEM)
========================= -->
<div id="playerWindow">

<div id="playerBg"></div>

<h2 style="text-align:center;">Spieler System</h2>

<!-- CONTENT -->
<div id="playerContent" style="padding:20px; max-width:900px; margin:auto;"></div>

<!-- BUTTON BAR -->
<div style="position:fixed; bottom:20px; width:100%; display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">

    <button class="btn" onclick="showAddPlayer()">Spieler anlegen</button>
    <button class="btn" onclick="renderPlayers()">Liste</button>
    <button class="btn" onclick="closePlayerWindow()">Zurück</button>

</div>

</div>

<script>

/* =========================
   PLAYER DATABASE
========================= */
let players = [];

/* OPEN / CLOSE */
function openPlayerWindow() {
    document.getElementById("playerWindow").style.display = "block";
}

function closePlayerWindow() {
    document.getElementById("playerWindow").style.display = "none";
}

/* =========================
   PLAYER FORM (ALLE FELDER)
========================= */
function showAddPlayer() {

    document.getElementById("playerContent").innerHTML = `
        <h3>Spieler anlegen</h3>

        <input id="pName" placeholder="Spielername"><br>
        <input id="pID" placeholder="Spieler ID"><br>
        <input id="pDate" placeholder="Anmeldedatum"><br>
        <input id="pPoints" placeholder="Spieler Punkte"><br>
        <input id="pRank" placeholder="Globaler Rang"><br>
        <input id="pJoin" placeholder="Spiel beigetreten (Datum/Season)"><br>
        <input id="pKoa" placeholder="Koa Siege"><br>
        <input id="pSingle" placeholder="Einzel Siege"><br>
        <input id="pDestroyed" placeholder="Zerstört"><br>
        <input id="pLosses" placeholder="Verluste"><br>
        <input id="pMap" placeholder="Meistgespielte Map"><br>
        <input id="pAlliance" placeholder="Bulls Allianz"><br>
        <input id="pRole" placeholder="Rolle"><br>

        <br>
        <button onclick="savePlayer()">Speichern</button>
    `;
}

/* =========================
   SAVE PLAYER
========================= */
function savePlayer() {

    let tempPass = Math.random().toString(36).substring(2, 8);

    let player = {
        name: document.getElementById("pName").value,
        id: document.getElementById("pID").value,
        date: document.getElementById("pDate").value,
        points: document.getElementById("pPoints").value,
        rank: document.getElementById("pRank").value,
        join: document.getElementById("pJoin").value,
        koa: document.getElementById("pKoa").value,
        single: document.getElementById("pSingle").value,
        destroyed: document.getElementById("pDestroyed").value,
        losses: document.getElementById("pLosses").value,
        map: document.getElementById("pMap").value,
        alliance: document.getElementById("pAlliance").value,
        role: document.getElementById("pRole").value,
        password: tempPass,
        firstLogin: true
    };

    players.push(player);

    alert(
        "Spieler erstellt!\n\n" +
        "Login: " + player.name + "\n" +
        "Einmalpasswort: " + tempPass + "\n\n" +
        "Beim ersten Login muss das Passwort geändert werden!"
    );

    renderPlayers();
}

/* =========================
   LISTE
========================= */
function renderPlayers() {

    let html = "<h3>Spieler Liste</h3>";

    players.forEach((p, i) => {

        html += `
            <div style="border:1px solid white; padding:10px; margin:5px;">
                <b>${p.name}</b> | ID: ${p.id} | Punkte: ${p.points}
            </div>
        `;
    });

    document.getElementById("playerContent").innerHTML = html;
}

</script>
