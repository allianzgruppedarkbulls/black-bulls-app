<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;

    /* 🖼️ Hintergrundbild (JETZT korrekt aus GitHub Repo) */
    background-image: url("bulls.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* 🔐 LOGIN OBEN */
#loginBar {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #00c853;
    padding: 12px 40px;
    border-radius: 5px;
    color: black;
    font-weight: bold;
}

/* 🔲 BUTTON CONTAINER UNTEN */
#menu {
    position: absolute;
    bottom: 60px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
}

/* 🔘 BUTTONS */
.btn {
    padding: 18px 50px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
}

.youtube {
    background: #ffcc00;
    color: black;
}

.story {
    background: #ff3b3b;
    color: white;
}

.web {
    background: #ff3b3b;
    color: white;
}

/* 🪟 STORY MODAL */
#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

#modalContent {
    background: #111;
    padding: 30px;
    width: 70%;
    height: 70%;
    overflow-y: auto;
    border-radius: 10px;
    line-height: 1.5;
}

#closeBtn {
    margin-top: 20px;
    background: red;
    color: white;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBar">Admin</div>

<!-- 🔘 MENU -->
<div id="menu">
    <button class="btn youtube" onclick="openYouTube()">YouTube</button>
    <button class="btn story" onclick="openStory()">Unsere Geschichte</button>
    <button class="btn web" onclick="openWeb()">Internetseite</button>
</div>

<!-- 🪟 STORY MODAL -->
<div id="modal">
    <div id="modalContent">

<h2>🐂 Die Entstehung der Dark Bulls</h2>

<p>
Alles begann eigentlich ganz unspektakulär – aus purer Langeweile.
Durch eine Werbung bin ich auf Call of War gestoßen...
</p>

<p>
(👉 kompletter Text kann hier rein)
</p>

<button id="closeBtn" onclick="closeStory()">Schließen</button>

    </div>
</div>

<script>

// ▶ YouTube öffnen
function openYouTube() {
    window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank");
}

// ▶ Website öffnen
function openWeb() {
    window.open("https://darkbulls.jimdofree.com/", "_blank");
}

// ▶ Story öffnen
function openStory() {
    document.getElementById("modal").style.display = "flex";
}

// ▶ Story schließen
function closeStory() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
