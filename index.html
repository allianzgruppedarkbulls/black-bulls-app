<div id="pinChangeModal" class="modal-overlay">
    <div class="modal-box" id="pinModalContent">
        <h1>PIN ÄNDERN</h1>
        <div id="pinChangeForm">
            <p style="color: #39d353;">Benutzer: <span id="pinUser"></span></p>
            <input type="password" id="oldPin" placeholder="Alte PIN">
            <input type="password" id="newPin1" placeholder="Neue PIN">
            <input type="password" id="newPin2" placeholder="Neue PIN wiederholen">
            <div class="login-btn-row">
                <button class="logbtn btn-green" onclick="submitPinChange()">Speichern</button>
                <button class="logbtn btn-red" onclick="closePinModal()">Abbruch</button>
            </div>
        </div>
        <div id="pinSuccessMessage" style="display: none;">
            <p style="color: #ffd600; font-size: 24px; margin-bottom: 20px;">✓ PIN erfolgreich geändert!</p>
            <p style="color: #fff; font-size: 18px;">Dein neuer PIN lautet:</p>
            <p id="displayNewPin" style="color: #39d353; font-size: 32px; font-weight: bold; letter-spacing: 5px; margin: 15px 0;"></p>
            <p style="color: #ff3131; font-size: 16px; margin-bottom: 25px;">Bitte merke dir diesen PIN gut!</p>
            <button class="logbtn btn-green" onclick="closePinModal()">Verstanden / Schließen</button>
        </div>
    </div>
</div>

<script>
    // Diese Funktionen im Script-Teil ersetzen/ergänzen:

    function closePinModal() {
        document.getElementById('pinChangeModal').style.display = 'none';
        // Reset für den nächsten Aufruf
        document.getElementById('pinChangeForm').style.display = 'block';
        document.getElementById('pinSuccessMessage').style.display = 'none';
        document.getElementById('newPin1').value = "";
        document.getElementById('newPin2').value = "";
        document.getElementById('oldPin').value = "";
    }

    async function submitPinChange() {
        const n1 = document.getElementById("newPin1").value;
        const n2 = document.getElementById("newPin2").value;
        const player = document.getElementById("pinUser").innerText;

        if (n1 !== n2) return alert("Neue PINs nicht identisch!");
        if (n1.length < 4) return alert("Die PIN muss mindestens 4 Zeichen haben!");

        const payload = {
            action: "updatePin",
            playerName: player,
            newPin: n1
        };

        try {
            // Button kurz deaktivieren während des Sendens
            const saveBtn = event.target;
            saveBtn.innerText = "Wird übertragen...";
            saveBtn.disabled = true;

            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await response.text();

            if (result === "PIN geändert") {
                // Erfolg: Formular verstecken, Meldung zeigen
                document.getElementById('pinChangeForm').style.display = 'none';
                document.getElementById('displayNewPin').innerText = n1;
                document.getElementById('pinSuccessMessage').style.display = 'block';
                loadData(); // Daten im Hintergrund aktualisieren
            } else {
                alert("Fehler vom Server: " + result);
                saveBtn.innerText = "Speichern";
                saveBtn.disabled = false;
            }
        } catch (e) {
            alert("Übertrag fehlgeschlagen!");
            console.error(e);
        }
    }
</script>
