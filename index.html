<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V5.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        
        /* DASHBOARD HINTERGRUND */
        #dashboard { position: relative; width: 100vw; height: 100vh; background: black; display: block; }
        #bg-logo { position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 800px; opacity: 0.4; z-index: 1; pointer-events: none; }

        /* PANELS POSITIONIERUNG */
        .panel { position: absolute; background: rgba(20, 20, 20, 0.9); border: 1px solid #444; padding: 15px; z-index: 10; border-radius: 8px; width: 260px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .panel h2 { color: #ff3131; margin: 0 0 10px 0; font-size: 24px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 8px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; transition: 0.2s; }
        .panel button:hover { background: #fff; }

        #personal { left: 40px; top: 40px; }
        #blacklist { left: 40px; top: 350px; }
        #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; } /* Black Liste Pflege */
        #admin { right: 40px; top: 100px; }
        #elo { right: 40px; top: 380px; }

        /* HEADER & CHAT BUTTON */
        #top-bar { position: absolute; top: 20px; right: 40px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        #chat-btn { position: absolute; right: 40px; bottom: 40px; background: #ff8c00; padding: 20px 60px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 10; font-family: 'Almendra'; border: none; border-radius: 8px; color: black; box-shadow: 0 0 20px rgba(255,140,0,0.5); }

        /* CHAT HUB MODAL (COW STYLE) */
        .modal-chat { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .chat-container { background: #1a1a1a; width: 900px; height: 600px; border: 2px solid #333; display: flex; box-shadow: 0 0 100px black; border-radius: 10px; overflow: hidden; position: relative; }
        
        .chat-sidebar { width: 250px; background: #111; border-right: 2px solid #333; display: flex; flex-direction: column; }
        .chat-sidebar h3 { padding: 15px; color: #ff3131; border-bottom: 1px solid #333; margin: 0; }
        .chan-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chan-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s; }
        .chan-item:hover { background: #333; }

        .chat-main { flex: 1; display: flex; flex-direction: column; padding: 20px; text-align: center; }
        .chat-main h1 { color: #ff3131; text-decoration: underline; margin-top: 0; }
        
        /* INPUT FIELDS COW STYLE */
        .cow-input-box { width: 100%; margin-bottom: 20px; text-align: left; }
        .cow-input-box label { display: block; color: #ff3131; font-size: 22px; margin-bottom: 5px; }
        .cow-field { width: 100%; background: #000; border: 1px solid #777; color: #39d353; padding: 15px; font-family: 'Almendra'; font-size: 20px; box-sizing: border-box; }
        .cow-area { height: 200px; resize: none; }

        /* BUTTON ROW */
        .btn-row { display: flex; justify-content: space-between; margin-top: auto; gap: 10px; }
        .c-btn { flex: 1; padding: 15px; border: none; font-weight: bold; cursor: pointer; font-family: 'Almendra'; border-radius: 4px; font-size: 18px; }
        .c-green { background: #39d353; color: black; }
        .c-yellow { background: #ffd600; color: black; }
        .c-red { background: #d50000; color: white; }

    </style>
</head>
<body>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 22px; color:#ff3131">Julian (Admin)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 25px; cursor:pointer; font-family:'Almendra'; border-radius:5px;">LOGOUT</button>
    </div>
    
    <img src="bulls_dashboard.jpg" id="bg-logo">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button onclick="openChat()">SUPPORT / CHAT</button>
        <button onclick="alert('PIN ändern folgt')">Pin ändern</button>
        <button>Statistiken</button>
    </div>

    <div class="panel" id="blacklist">
        <h2>Black Liste</h2>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Black Liste Pflege</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button style="font-size: 14px;">Gemeldete Spieler</button>
            <button>Pflege</button>
            <button>Eintragen</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button>User-Verwaltung</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rechner</button>
    </div>

    <button id="chat-btn" onclick="openChat()">ALLIANZ CHAT</button>
</div>

<div id="chatModal" class="modal-chat">
    <div class="chat-container">
        <div class="chat-sidebar">
            <div style="display: flex; background: #333;">
                <button style="flex:1; padding:10px; background:#222; border:none; color:white;">ALLIANZ CHAT</button>
                <button style="flex:1; padding:10px; background:#444; border:none; color:white;">PN CHAT</button>
            </div>
            <h3>Kommunikations</h3>
            <div class="chan-list">
                <div class="chan-item"># plauderecke</div>
                <div class="chan-item"># spielersuche</div>
                <div class="chan-item"># karte-holland</div>
                <div class="chan-item"># support</div>
            </div>
        </div>
        <div class="chat-main">
            <h1>DIPLOMATIE / CHAT HUB</h1>
            
            <div class="cow-input-box">
                <label>Kanal Name / User...</label>
                <input type="text" class="cow-field" placeholder="...">
            </div>

            <div class="cow-input-box">
                <label>Nachricht...</label>
                <textarea class="cow-field cow-area" placeholder="Deine Nachricht an die Allianz..."></textarea>
            </div>

            <div class="btn-row">
                <button class="c-btn c-green">Nachricht Bestätigen</button>
                <button class="c-btn c-yellow">Hilfe</button>
                <button class="c-btn c-red" onclick="closeChat()">Abbruch</button>
            </div>
        </div>
        <button onclick="closeChat()" style="position:absolute; top:10px; right:10px; background:red; color:white; border:none; width:30px; height:30px; cursor:pointer;">X</button>
    </div>
</div>

<script>
    function openChat() { document.getElementById('chatModal').style.display = 'flex'; }
    function closeChat() { document.getElementById('chatModal').style.display = 'none'; }
</script>

</body>
</html>
