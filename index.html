<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V11.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        #loginBar { position: absolute; left: 0; top: 35%; transform: translateY(-50%); background: #39d353; padding: 30px 5px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        #regBar { position: absolute; left: 0; top: 65%; transform: translateY(-50%); background: #ffd600; padding: 25px 5px; font-size: 14px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .dark-modal { background: #1a1a1a; padding: 30px; width: 450px; max-width: 90vw; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 50px rgba(255,0,0,0.4); }
        .dark-modal input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; outline: none; }
        .logbtn { padding: 15px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; font-size: 18px; border-radius: 5px; color: black; }
        
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; background: black; }
        #bg-bull { position: fixed; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.4; pointer-events: none; }
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; z-index: 100; background: rgba(0,0,0,0.8); box-sizing: border-box;}
        
        .panel { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; }

        /* --- CHAT WINDOW --- */
        .chat-window { width: 95vw; height: 90vh; background: #0a0a0a; border: 2px solid #444; display: flex; flex-direction: column; border-radius: 10px; overflow: hidden; }
        .chat-tabs { display: flex; background: #1a1a1a; border-bottom: 2px solid #333; }
        .chat-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-right: 1px solid #333; font-weight: bold; transition: 0.3s; color: #888; }
        .chat-tab.active { background: #39d353; color: black; }
        .chat-body { display: flex; flex: 1; overflow: hidden; }
        .chat-sidebar { width: 220px; border-right: 1px solid #333; overflow-y: auto; background: #111; }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #000; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .chat-input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 10px; background: #000; border: 1px solid #444; color: #39d353; font-size: 18px; }
        
        .msg { padding: 8px 12px; border-radius: 5px; max-width: 80%; font-size: 18px; }
        .msg-own { align-self: flex-end; background: #1b4d1b; border-right: 4px solid #39d353; }
        .msg-other { align-self: flex-start; background: #222; border-left: 4px solid #ff3131; }

        #chat-btn { position: fixed; bottom: 0; right: 0; background: #ff8c00; padding: 15px; font-size: 22px; font-weight: bold; cursor: pointer; z-index: 200; font-family: 'Almendra'; width: 100%; display: none; color: black; border: none; opacity: 0; transition: opacity 1s; }
        
        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 40px; top: 80px; }
            #blacklistPanel { left: 40px; top: 380px; }
            #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
            #admin { right: 40px; top: 120px; width: 260px; }
            #elo { right: 40px; top: 420px; width: 260px; }
            #chat-btn { width: auto; right: 40px; bottom: 40px; border-radius: 8px; padding: 20px 60px; font-size: 28px; }
        }

        .contact-item { padding: 12px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .contact-item:hover { background: #1a1a1a; color: #39d353; }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="document.getElementById('regModal').style.display='flex'">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="dark-modal">
        <h1 style="color:#ff3131">Anmeldung</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <button class="logbtn" style="width:100%; background:#39d353" onclick="doLogin()">Anmelden</button>
    </div>
</div>

<div id="fullChatModal" class="modal-overlay">
    <div class="chat-window">
        <div class="chat-tabs">
            <div class="chat-tab active" id="tab-mitglieder" onclick="switchTab('mitglieder')">MITGLIEDER</div>
            <div class="chat-tab" id="tab-pn" onclick="switchTab('pn')">NACHRICHTEN</div>
            <div class="chat-tab" id="tab-gruppen" onclick="switchTab('gruppen')">GRUPPEN</div>
            <div class="chat-tab" style="background:#d50000; color:white; flex:0.2;" onclick="document.getElementById('fullChatModal').style.display='none'">X</div>
        </div>
        <div class="chat-body">
            <div class="chat-sidebar" id="chatSidebar"></div>
            <div class="chat-main">
                <div id="chatHeader" style="padding:10px; background:#222; font-weight:bold; color:#39d353; border-bottom:1px solid #333;">Wähle jemanden aus...</div>
                <div class="chat-history" id="chatHistory"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Nachricht...">
                    <button class="logbtn" style="background:#39d353; padding:10px 20px" onclick="sendChatMessage()">SENDEN</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:15px; border-radius:5px;">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">
    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button onclick="openSupportChat()">Support Chat</button>
    </div>
    <button id="chat-btn" onclick="document.getElementById('fullChatModal').style.display='flex'">ALLIANZ CHAT</button>
</div>

<script>
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';
    const GID_CHAT = '274206006';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLm15M-C9GmMlCqYO63C9_T4942ZT19WMA_RkwASCzZptaSyNeZ_brizzGqjs6JAmf3Q/exec';

    let users = [];
    let chatPartner = "";
    let myName = "";
    let activeTab = "mitglieder";

    async function loadData() {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        users = rows.map(r => {
            const c = r.split(/,(?=(?:(?:[^[^"]*"){2})*[^"]*$)/);
            const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
            return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
        });
    }

    function doLogin() {
        const n = document.getElementById("nameInput").value.trim().toLowerCase();
        const p = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);
        if (u) {
            myName = u.name;
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;
            switchTab('mitglieder');
            setInterval(loadChatHistory, 5000);
            setTimeout(() => {
                document.querySelectorAll('.panel').forEach(p => p.classList.add('visible'));
                document.getElementById("chat-btn").style.display = "block";
                setTimeout(() => document.getElementById("chat-btn").style.opacity = "1", 100);
            }, 500);
        } else { alert("Login falsch!"); }
    }

    function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        
        const sidebar = document.getElementById("chatSidebar");
        sidebar.innerHTML = "";

        if(tab === "mitglieder") {
            users.forEach(u => {
                if(u.name !== myName) {
                    let div = document.createElement("div");
                    div.className = "contact-item";
                    div.innerText = u.name;
                    div.onclick = () => startChat(u.name);
                    sidebar.appendChild(div);
                }
            });
        } else if(tab === "pn") {
            sidebar.innerHTML = "<div style='padding:10px; color:#888;'>Suche aktive Verläufe...</div>";
            // Hier kommt später die Logik rein, die nur Leute anzeigt, mit denen man schon geschrieben hat
            let div = document.createElement("div");
            div.className = "contact-item";
            div.innerHTML = "🛡️ <b>SUPPORT ANFRAGEN</b>";
            div.onclick = () => startChat('SUPPORT');
            sidebar.appendChild(div);
        } else if(tab === "gruppen") {
            sidebar.innerHTML = "<div style='padding:10px; color:#39d353;'>Demnächst: Gruppen-Channels</div>";
        }
    }

    function startChat(partner) {
        chatPartner = partner;
        document.getElementById("chatHeader").innerText = "Chat mit: " + partner;
        loadChatHistory();
    }

    async function sendChatMessage() {
        const msg = document.getElementById("chatInput").value.trim();
        if(!msg || !chatPartner) return;
        let kanalID = (chatPartner === "SUPPORT") ? "SUPPORT-" + myName : [myName, chatPartner].sort().join("-");
        const payload = { action: "sendChat", absender: myName, kanalID: kanalID, nachricht: msg };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        document.getElementById("chatInput").value = "";
        loadChatHistory();
    }

    async function loadChatHistory() {
        if(!chatPartner || document.getElementById('fullChatModal').style.display === 'none') return;
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_CHAT}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const history = document.getElementById("chatHistory");
        
        let kanalID = (chatPartner === "SUPPORT") ? "SUPPORT-" + myName : [myName, chatPartner].sort().join("-");
        const role = document.getElementById("userRoleDisplay").innerText;

        let html = "";
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
            let show = (c[2] === kanalID);
            if(chatPartner === "SUPPORT" && (role === "Admin" || role === "Support") && c[2].startsWith("SUPPORT-")) show = true;

            if(show) {
                html += `<div class="msg ${c[1] === myName ? 'msg-own' : 'msg-other'}">
                    <small style="color:#888">${c[1]}</small><br>${c[3]}
                </div>`;
            }
        });
        history.innerHTML = html;
        history.scrollTop = history.scrollHeight;
    }

    function openSupportChat() {
        document.getElementById('fullChatModal').style.display = 'flex';
        switchTab('pn');
        startChat('SUPPORT');
    }

    window.onload = loadData;
</script>
</body>
</html>
