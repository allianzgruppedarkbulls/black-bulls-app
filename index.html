<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* 🔐 LOGIN BUTTON */
#loginBar {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #39d353;
    padding: 12px 60px;
    font-size: 24px;
    font-weight: bold;
    color: black;
    cursor: pointer;
}

/* 🐂 LOGO */
#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#logo img {
    width: 600px;
    max-width: 80vw;
}

/* 🔘 MENU */
#menu {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 120px;
}

.btn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.youtube { background: orange; color: black; }
.story { background: #5b5bff; color: black; }
.web { background: #00cfd1; color: black; }

/* 🔐 MODAL */
#pinModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
}

/* BOX */
#pinBox {
    background: #111;
    padding: 40px;
    width: 400px;
    border: 2px solid #555;
}

/* TITLE */
#pinBox h1 {
    color: red;
    font-size: 32px;
}

/* LABEL */
#pinBox label {
    color: red;
    font-size: 22px;
}

/* INPUT */
#pinBox input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-top: 5px;
    margin-bottom: 15px;
    background: black;
    border: 2px solid #aaa;
    color: white;
}

/* BUTTON ROW */
#btnRow {
    display: flex;
    justify-content: space-between;
}

/* BUTTONS */
.loginBtn {
    padding: 12px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    width: 30%;
}

.green { background: #00c853; }
.yellow { background: #ffd600; }
.red { background: #d50000; color: white; }

</style>

</head>

<body>

<!-- 🔐 LOGIN BUTTON -->
<div id="loginBar" onclick="openLogin()">Login</div>

<!-- 🐂 LOGO -->
<div id="logo">
    <img src="bulls.jpg">
</div>

<!-- 🔘 MENU -->
<div id="menu">
    <button class="btn youtube" onclick="openYouTube()">YouTube</button>
    <button class="btn story" onclick="openStory()">Histories</button>
    <button class="btn web" onclick="openWeb()">Internet</button>
</div>

<!-- 🔐 LOGIN MODAL -->
<div id="pinModal">
    <div id="pinBox">

        <h1>Benutzeranmeldung</h1>

        <label>Name</label>
        <input type="text" id="nameInput">

        <label>PIN</label>
        <input type="password" id="pinInput">

        <div id="btnRow">
            <button class="loginBtn green" onclick="checkLogin()">Anmelden</button>
            <button class="loginBtn yellow" onclick="showHelp()">Hilfe</button>
            <button class="loginBtn red" onclick="closeLogin()">Abbruch</button>
        </div>

    </div>
</div>

<script>

// 🔐 USER LISTE (TEST)
let users = [
    { name: "Admin", pin: "1234" },
    { name: "Julian", pin: "5678" }
];

// LOGIN ÖFFNEN
function openLogin() {
    document.getElementById("pinModal").style.display = "flex";
}

// LOGIN SCHLIESSEN
function closeLogin() {
    document.getElementById("pinModal").style.display = "none";
}

// LOGIN PRÜFEN
function checkLogin() {
    let name = document.getElementById("nameInput").value;
    let pin = document.getElementById("pinInput").value;

    let user = users.find(u => u.name === name && u.pin === pin);

    if (user) {
        alert("Willkommen " + user.name);
        closeLogin();
    } else {
        alert("Falsche Daten!");
    }
}

// HILFE
function showHelp() {
    alert("Bitte Name und PIN eingeben.");
}

// LINKS
function openYouTube() {
    window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank");
}

function openWeb() {
    window.open("https://darkbulls.jimdofree.com/", "_blank");
}

function openStory() {
    alert("Story kommt als nächstes als richtiges Fenster");
}

</script>

</body>
</html>
