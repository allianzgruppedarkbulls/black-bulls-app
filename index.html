<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V5.9</title>

    <link rel="icon" type="image/png" href="192x192icon.png">
    <link rel="apple-touch-icon" href="192x192icon.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        
        /* --- STARTSEITE --- */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        
        #loginBar { position: absolute; left: 0; top: 35%; transform: translateY(-50%); background: #39d353; padding: 30px 5px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        #regBar { position: absolute; left: 0; top: 65%; transform: translateY(-50%); background: #ffd600; padding: 25px 5px; font-size: 14px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }

        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .info-btn { padding: 15px 5px; font-size: 15px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 10px 0 0 10px; width: 40px; text-align: center; color: black; min-height: 100px; }
        #btn-yt { background: #ff8c00; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 30px; width: 400px; max-width: 85vw; border: 3px solid #333; text-align: center; border-radius: 12px; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; outline: none; }

        /* --- DASHBOARD --- */
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; background: black; }
        #bg-bull { position: fixed; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.4; pointer-events: none; }
        
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 10px 20px; z-index: 100; box-sizing: border-box; background: rgba(0,0,0,0.8); }
        
        /* Animation für Panels */
        .panel { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 8px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; font-size: 14px; }

        #chat-btn { position: fixed; bottom: 0; right: 0; background: #ff8c00; padding: 15px; font-size: 22px; font-weight: bold; cursor: pointer; z-index: 200; font-family: 'Almendra'; width: 100%; display: none; color: black; border: none; opacity: 0; transition: opacity 1s; }

        /* PC Postitionen */
        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 40px; top: 80px; }
            #blacklist { left: 40px; top: 380px; }
            #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
            #admin { right: 40px; top: 120px; width: 260px; }
            #elo { right: 40px; top: 420px; width: 260px; }
            #chat-btn { width: auto; right: 40px; bottom: 40px; border-radius: 8px; padding: 20px 60px; font-size: 28px; }
        }

        /* --- HANDY FIX --- */
        @media (max-width: 800px) {
            #loginBar, #regBar, .info-btn { width: 35px; padding: 15px 3px; font-size: 14px; }
            #side-menu { gap: 5px; }
            
            #dashboard { overflow-y: auto; display: none; flex-direction: column; align-items: center; padding-top: 70px; padding-bottom: 100px; }
            .panel { position: relative !important; width: 92% !important; left: auto !important; top: auto !important; margin: 10px auto !important; }
            .panel button { padding: 12px; font-size: 16px; } /* Etwas größer zum Tippen, aber Box kleiner */
        }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="document.getElementById('regModal').style.display='flex'">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button class="info-btn" id="btn-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="info-btn" id="btn-hist" style="background:#5b5bff; color:white;">HISTORIES</button>
        <button class="info-btn" id="btn-web" style="background:#00cfd1;" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div style="display:flex; gap:10px;">
            <button class="logbtn" style="flex:1; background:#39d353; padding:15px; border:none; font-family:'Almendra'; font-weight:bold;" id="finalLoginBtn">Anmelden</button>
            <button class="logbtn" style="flex:1; background:#d50000; color:white; border:none; font-family:'Almendra';" onclick="document.getElementById('pinModal').style.display='none'">Abbruch</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:10px; border-radius:5px; font-family:'Almendra';">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button>Pin ändern</button>
        <button>Statistiken</button>
        <button>Tipps</button>
    </div>

    <div class="panel" id="blacklist">
        <h2>Black Liste</h2>
        <button>Sp. Melden</button>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Pflege Admin</h2>
        <button>Gemeldete Spieler</button>
        <button>Pflege</button>
        <button>Eintragen</button>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button>User-Verwaltung</button>
        <button>Einstellungen</button>
        <button style="background:#ffd600">Hilfe-Anfragen</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
        <button>Einheitenrechner</button>
    </div>

    <button id="chat-btn">ALLIANZ CHAT</button>
</div>

<script>
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID = '1188820112'; 
    let users = [];

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
            });
        } catch (e) { console.error("Datenfehler!"); }
    }

    function doLogin() {
        const inputName = document.getElementById("nameInput").value.trim().toLowerCase();
        const inputPin = document.getElementById("pinInput").value.trim();
        const u = users.find(user => user.name.toLowerCase() === inputName && user.pin === inputPin);

        if (u) {
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            
            const dash = document.getElementById("dashboard");
            dash.style.display = window.innerWidth <= 800 ? "flex" : "block";
            
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;

            // --- ANIMATIONS LOGIK ---
            // Zuerst nur Hintergrund, dann Buttons einblenden
            setTimeout(() => {
                const panels = document.querySelectorAll('.panel');
                panels.forEach((p, index) => {
                    // Prüfen, ob User das Panel sehen darf
                    let darfSehen = false;
                    if (u.role === "Admin") darfSehen = true;
                    else if (p.id === "personal") darfSehen = true;
                    else if (p.id === "blacklist" && u.role !== "Gast" && u.role !== "Neuling") darfSehen = true;
                    
                    if (darfSehen) {
                        p.style.display = "block";
                        setTimeout(() => p.classList.add('visible'), index * 150); // Sanftes Nacheinander-Einblenden
                    }
                });
                const chatBtn = document.getElementById("chat-btn");
                chatBtn.style.display = "block";
                setTimeout(() => chatBtn.style.opacity = "1", 500);
            }, 800); // 0,8 Sekunden warten (nur Hintergrund zeigen)

        } else { alert("Login falsch!"); }
    }

    document.getElementById("finalLoginBtn").onclick = doLogin;
    window.onload = loadData;
</script>
</body>
</html>
