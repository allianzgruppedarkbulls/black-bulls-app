<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V12.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* FIX: Hintergrund und Grundstruktur */
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* STARTSEITE FIX */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 1000; }
        #logo-container img { width: 700px; max-width: 80vw; filter: drop-shadow(0 0 50px red); }
        
        /* DASHBOARD FIX: Erzwungene Verteilung */
        #dashboard { display: none; padding-top: 100px; min-height: 100vh; position: relative; box-sizing: border-box; }
        #bg-bull { position: fixed; left: 50%; top: 55%; transform: translate(-50%, -50%); width: 750px; opacity: 0.25; pointer-events: none; z-index: 1; }
        
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: flex-end; padding: 20px 40px; background: rgba(0,0,0,0.9); z-index: 2000; border-bottom: 2px solid #333; box-sizing: border-box; }

        /* PANEL GRID: Verhindert das "alles oben klebt" */
        .panel-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 40px; 
            padding: 40px; 
            max-width: 1400px; 
            margin: 0 auto; 
            position: relative; 
            z-index: 10; 
        }

        .panel { background: rgba(20, 20, 20, 0.9); border: 2px solid #444; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .panel h2 { color: #ff3131; margin-top: 0; text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; font-size: 24px; }
        .panel button { display: block; width: 100%; margin: 10px 0; background: #39d353; border: none; padding: 12px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 5px; font-size: 16px; }
        .panel button:hover { background: #45f563; transform: scale(1.02); }

        /* CHAT BUTTON */
        #chat-btn { position: fixed; bottom: 30px; right: 30px; background: #ff8c00; padding: 20px 50px; font-size: 24px; font-weight: bold; cursor: pointer; z-index: 3000; font-family: 'Almendra'; border: none; border-radius: 10px; box-shadow: 0 0 20px rgba(255,140,0,0.4); }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .dark-modal { background: #1a1a1a; padding: 30px; width: 450px; border: 3px solid #333; border-radius: 15px; text-align: center; }
        .dark-modal input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; }

        /* CHAT WINDOW FIX */
        .chat-window { width: 90vw; height: 85vh; background: #0a0a0a; border: 2px solid #444; display: flex; flex-direction: column; border-radius: 10px; }
        .chat-tabs { display: flex; background: #1a1a1a; }
        .chat-tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; color: #888; font-weight: bold; }
        .chat-tab.active { background: #39d353; color: black; }
        .chat-body { display: flex; flex: 1; overflow: hidden; }
        .chat-sidebar { width: 250px; border-right: 1px solid #333; overflow-y: auto; background: #111; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { padding: 10px; border-radius: 8px; max-width: 70%; font-size: 18px; line-height: 1.4; }
        .msg-own { align-self: flex-end; background: #1b4d1b; color: #fff; border-right: 4px solid #39d353; }
        .msg-other { align-self: flex-start; background: #222; color: #fff; border-left: 4px solid #ff3131; }
    </style>
</head>
<body>

<div id="start">
    <div id="logo-container" onclick="document.getElementById('pinModal').style.display='flex'">
        <img src="bulls_start.jpg" style="cursor:pointer">
        <p style="text-align:center; color:#39d353; font-size:20px;">ZUM EINLOGGEN KLICKEN</p>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="dark-modal">
        <h1 style="color:#ff3131">Bullen Area</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <button onclick="doLogin()">ZUTRITT GEWÄHREN</button>
        <button onclick="document.getElementById('pinModal').style.display='none'" style="background:#444; color:white;">ZURÜCK</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 20px; color:#ff3131"><span id="userNameDisplay"></span> | <span id="userRoleDisplay"></span></div>
        <button onclick="location.reload()" style="background:red; border:none; padding:8px 15px; margin-left:20px; border-radius:5px; cursor:pointer; color:white; font-family:'Almendra';">LOGOUT</button>
    </div>
    
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel-container">
        <div class="panel">
            <h2>Persönlich</h2>
            <button onclick="alert('In Arbeit...')">Nachrichten</button>
            <button onclick="alert('In Arbeit...')">Mein Profil</button>
        </div>
        
        <div class="panel">
            <h2>Kriegskasse</h2>
            <button>Rohstoffrechner</button>
            <button>Truppenplaner</button>
        </div>

        <div class="panel" id="adminArea" style="display:none;">
            <h2>Management</h2>
            <button style="background:#ffd600" onclick="openGroupMgmt()">Neue Karte (Discord)</button>
            <button>User Verwaltung</button>
        </div>

        <div class="panel">
            <h2>Blacklist</h2>
            <button onclick="alert('Liste lädt...')">Blacklist öffnen</button>
            <button style="background:#ff3131; color:white">Spieler melden</button>
        </div>
    </div>

    <button id="chat-btn" onclick="openChat()">ALLIANZ CHAT</button>
</div>

<div id="groupMgmtModal" class="modal-overlay">
    <div class="dark-modal">
        <h2 style="color:#ffd600">Discord-Gruppe erstellen</h2>
        <input type="text" id="newGroupName" placeholder="Karten Name (z.B. Weltbrand 1)">
        <input type="text" id="newGroupWebhook" placeholder="Discord Webhook Link">
        <p style="color:#888; font-size:12px;">Spieler werden automatisch aus der Datenbank geladen</p>
        <button onclick="createNewGroup()">GRUPPE AKTIVIEREN</button>
        <button onclick="document.getElementById('groupMgmtModal').style.display='none'" style="background:#444; color:white;">ABBRECHEN</button>
    </div>
</div>

<div id="fullChatModal" class="modal-overlay">
    <div class="chat-window">
        <div class="chat-tabs">
            <div class="chat-tab active" id="tab-mitglieder" onclick="switchChatTab('mitglieder')">SPIELER</div>
            <div class="chat-tab" id="tab-gruppen" onclick="switchChatTab('gruppen')">GRUPPEN (DC)</div>
            <div class="chat-tab" style="background:red; color:white; flex:0.2" onclick="document.getElementById('fullChatModal').style.display='none'">X</div>
        </div>
        <div class="chat-body">
            <div class="chat-sidebar" id="chatSidebar"></div>
            <div class="chat-main">
                <div id="chatHeader" style="padding:15px; background:#222; color:#39d353; font-weight:bold; border-bottom:1px solid #444;">Wähle einen Kanal...</div>
                <div class="chat-history" id="chatHistory"></div>
                <div style="padding:15px; background:#1a1a1a; display:flex; gap:10px;">
                    <input type="text" id="chatInput" style="flex:1; padding:12px; background:#000; border:1px solid #444; color:#39d353; font-size:18px;" placeholder="Deine Nachricht...">
                    <button onclick="sendChatMessage()" style="background:#39d353; padding:10px 25px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;">SENDEN</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxPOYJ1gg_7LFPZBXfX2sRf-xFVZZCgjsv-6ECMXD5S74PqbBxGyFQNCEDrDzD0bQlb/exec'; 
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112'; const GID_CHAT = '274206006'; const GID_STEER = '717972533';

    let users = []; let myName = ""; let myRole = ""; let chatPartner = ""; let isGroupChat = false;
    let activeGroups = [];

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}&t=${new Date().getTime()}`);
            const text = await res.text();
            users = text.split('\n').slice(1).map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return { name: c[0].replace(/"/g,""), role: c[3].replace(/"/g,""), pin: c[2].replace(/"/g,"") };
            });

            const resG = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_STEER}&t=${new Date().getTime()}`);
            const textG = await resG.text();
            activeGroups = textG.split('\n').slice(1).map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
                return { name: c[0], webhook: c[1], status: c[2], allowed: c[3] || "" };
            }).filter(g => g.status === "aktiv");
        } catch(e) { console.error("Fehler beim Laden:", e); }
    }

    function doLogin() {
        const nInput = document.getElementById("nameInput").value.trim();
        const pInput = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === nInput.toLowerCase() && x.pin === pInput);
        
        if (u) {
            myName = u.name; myRole = u.role;
            document.getElementById("start").style.display = "none";
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;
            if(myRole === "Admin" || myRole === "Ausbilder") document.getElementById("adminArea").style.display = "block";
            setInterval(loadChatHistory, 4000);
        } else { alert("Zutritt verweigert! Name oder PIN falsch."); }
    }

    function openChat() { document.getElementById('fullChatModal').style.display='flex'; switchChatTab('mitglieder'); }

    function switchChatTab(tab) {
        document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        const sidebar = document.getElementById("chatSidebar");
        sidebar.innerHTML = "";
        
        if(tab === 'mitglieder') {
            users.forEach(u => { if(u.name !== myName) sidebar.innerHTML += `<div style="padding:15px; border-bottom:1px solid #222; cursor:pointer;" onclick="startChat('${u.name}', false)">👤 ${u.name}</div>`; });
        } else {
            activeGroups.forEach(g => { sidebar.innerHTML += `<div style="padding:15px; border-bottom:1px solid #222; cursor:pointer;" onclick="startChat('${g.name}', true)">📢 ${g.name}</div>`; });
        }
    }

    function startChat(partner, isGrp) { chatPartner = partner; isGroupChat = isGrp; document.getElementById("chatHeader").innerText = "Chat mit: " + partner; loadChatHistory(); }

    async function sendChatMessage() {
        const input = document.getElementById("chatInput"); const msg = input.value.trim(); if(!msg || !chatPartner) return;
        let kanalID = isGroupChat ? "GRUPPE-" + chatPartner : [myName, chatPartner].sort().join("-");
        
        await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                action: isGroupChat ? "sendGroupChat" : "sendChat", 
                absender: myName, 
                kanalID: kanalID, 
                nachricht: msg 
            }) 
        });
        input.value = ""; loadChatHistory();
    }

    async function loadChatHistory() {
        if(!chatPartner) return;
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_CHAT}&t=${new Date().getTime()}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim()));
        let kanalID = isGroupChat ? "GRUPPE-" + chatPartner : [myName, chatPartner].sort().join("-");
        
        let html = "";
        rows.forEach(c => { if(c[2] === kanalID) html += `<div class="msg ${c[1] === myName ? 'msg-own' : 'msg-other'}"><small>${c[1]}</small><br>${c[3]}</div>`; });
        document.getElementById("chatHistory").innerHTML = html;
        document.getElementById("chatHistory").scrollTop = 99999;
    }

    function openGroupMgmt() { document.getElementById("groupMgmtModal").style.display = "flex"; }
    async function createNewGroup() {
        const name = document.getElementById("newGroupName").value.trim();
        const hook = document.getElementById("newGroupWebhook").value.trim();
        if(!name || !hook) return alert("Bitte Name und Webhook ausfüllen!");
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "createGroup", groupName: name, webhook: hook, allowedUsers: "ALLE" }) });
        alert("Gruppe erstellt! Lade Dashboard neu..."); location.reload();
    }

    window.onload = loadData;
</script>
</body>
</html>
