<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        
        /* STARTSEITE */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; }
        
        /* LOGIN LINKS */
        #loginBar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #39d353; padding: 60px 15px; font-size: 24px; font-weight: bold; color: black; cursor: pointer; z-index: 20; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; width: 60px; text-align: center; }
        
        #logo-container img { width: 780px; max-width: 70vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }

        /* MENÜ RECHTS (Das fehlte!) */
        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .info-btn { padding: 30px 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 15px 0 0 15px; transition: 0.3s; width: 60px; text-align: center; }
        #btn-yt { background: #ff8c00; color: black; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; color: black; }
        
        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 40px; width: 450px; border: 2px solid #333; text-align: center; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 20px; }

        /* DASHBOARD */
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; }
        #bg-bull { position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.5; }
        #top-bar { position: absolute; top: 20px; right: 40px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        
        .panel { position: absolute; background: rgba(20, 20, 20, 0.95); border: 1px solid #444; padding: 15px; z-index: 10; display: none; }
        .panel h2 { color: #ff3131; margin: 0 0 10px 0; font-size: 24px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 8px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; }
        
        #personal { left: 40px; top: 40px; width: 240px; }
        #blacklist { left: 40px; top: 350px; width: 240px; }
        #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
        #admin { right: 40px; top: 100px; width: 260px; }
        #elo { right: 40px; top: 380px; width: 260px; }
        #chat-btn { position: absolute; right: 40px; bottom: 40px; background: #ff8c00; padding: 15px 60px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 10; font-family: 'Almendra'; display: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    
    <div id="side-menu">
        <button id="btn-yt" class="info-btn" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button id="btn-hist" class="info-btn" onclick="alert('Histories folgen!')">HISTORIES</button>
        <button id="btn-web" class="info-btn" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name">
        <input type="password" id="pinInput" placeholder="PIN">
        <button onclick="login()" style="width:100%; padding:15px; background:#39d353; border:none; cursor:pointer; font-family:'Almendra'; font-weight:bold;">ANMELDEN</button>
        <button onclick="document.getElementById('pinModal').style.display='none'" style="margin-top:10px; background:transparent; color:red; border:none; cursor:pointer;">Abbrechen</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 22px; color:#ff3131"><span id="userName"></span> (<span id="userRole"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 25px; cursor:pointer; font-family:'Almendra';">LOGOUT</button>
    </div>

    <img src="bulls_dashboard.jpg" id="bg-bull">
    
    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button id="btn-pin">Pin ändern</button>
        <button id="btn-stats">Statistiken</button>
        <button id="btn-tipps">Tipps</button>
    </div>

    <div class="panel" id="blacklist">
        <h2>Black Liste</h2>
        <button>Sp. Melden</button>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Black Liste Pflege</h2>
        <div class="grid">
            <button id="bl-gemeldet" style="font-size:14px">Gemeldete Spieler</button>
            <button id="bl-pflege">Pflege</button>
            <button id="bl-eintragen">Eintragen</button>
            <button id="bl-ansicht">Volle Ansicht</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button id="adm-einst">Einstellungen</button>
        <button id="adm-stats">Statistiken</button>
        <button id="adm-hilfe" style="background: #ffd600;">Hilfe-Anfragen</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
        <button>Einheitenrechner</button>
    </div>

    <button id="chat-btn">CHAT</button>
</div>

<script>
    // DEINE NEUE MASTER-TABELLE
    const SHEET_ID = '1HC3U1u4rMU6eVem-wPL9OVDb2bRQNztlig4FQry78yQ';
    const GID = '2004474173';
    const READ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPsnss_E2hlpuZWuJe3DB3_92PkUG_IM1ETN10vjOBmEEyDrcLZleOSX0WSOm9DPSV/exec';

    let users = [];

    async function loadData() {
        try {
            const res = await fetch(READ_URL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
            });
        } catch (e) { console.error("Cloud-Fehler"); }
    }

    function login() {
        let name = document.getElementById("nameInput").value.trim();
        let pin = document.getElementById("pinInput").value.trim();
        let u = users.find(user => user.name.toLowerCase() === name.toLowerCase() && user.pin === pin);

        if (u) {
            document.getElementById("start").style.display = "none";
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userName").innerText = u.name;
            document.getElementById("userRole").innerText = u.role;
            applyRules(u.role);
        } else { alert("Login fehlgeschlagen!"); }
    }

    function applyRules(role) {
        const show = (id) => document.getElementById(id).style.display = "block";
        const hide = (id) => document.getElementById(id).style.display = "none";

        if (role === "Gast") {
            show("personal"); 
            hide("btn-stats"); hide("btn-tipps");
            show("chat-btn");
        } 
        else if (["Mitglied", "Kampfdivision", "Elo", "Buchhalter", "Ausbilder", "Offizier", "Admin"].includes(role)) {
            show("personal"); show("blacklist"); show("chat-btn");
            
            if (role === "Kampfdivision") hide("btn-tipps");
            if (role === "Elo" || role === "Admin") show("elo");
            if (role === "Buchhalter" || role === "Admin") show("blacklistAdmin");
            
            if (role === "Ausbilder" || role === "Offizier") {
                show("blacklistAdmin");
                hide("bl-gemeldet"); hide("bl-pflege"); hide("bl-eintragen");
                show("admin");
                hide("adm-einst");
            }

            if (role === "Admin") {
                show("admin"); show("blacklistAdmin"); show("elo");
                show("adm-einst"); show("bl-gemeldet"); show("bl-pflege"); show("bl-eintragen");
            }
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
