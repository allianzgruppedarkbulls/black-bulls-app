<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard</title>
    
    <!-- Google Fonts für die coole Gaming-Schrift -->
    <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Almendra', serif;
            background: black;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* STARTSEITE */
        #start {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: black;
        }

        #loginBar {
            position: absolute;
            top: 40px;
            background: #39d353;
            padding: 12px 60px;
            font-size: 24px;
            font-weight: bold;
            color: black;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(57, 211, 83, 0.3);
        }

        #logo-container img {
            width: 700px;
            max-width: 80vw;
            filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.4));
        }

        #menu {
            margin-top: 50px;
            display: flex;
            gap: 50px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-family: 'Almendra', serif;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.1); }
        .youtube { background: #ff8c00; color: black; }
        .story { background: #5b5bff; color: white; }
        .web { background: #00cfd1; color: black; }

        /* LOGIN MODAL */
        #pinModal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        #pinBox {
            background: #1a1a1a;
            padding: 40px;
            width: 350px;
            border: 2px solid #333;
            text-align: center;
        }

        #pinBox h1 { color: #ff3131; margin-bottom: 20px; }
        #pinBox label { color: #ff3131; display: block; text-align: left; margin-bottom: 5px; }
        #pinBox input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #000;
            color: #39d353;
            border: 1px solid #444;
            box-sizing: border-box;
            font-size: 18px;
        }

        .loginBtn {
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Almendra', serif;
        }
        .green { background: #39d353; color: black; }
        .yellow { background: #ffd600; color: black; }
        .red { background: #d50000; color: white; }

        /* DASHBOARD LAYOUT (Wie im Wunschbild) */
        #dashboard {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            background: black;
        }

        #bg-bull {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 650px;
            z-index: 1;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.2));
        }

        #userInfo {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 24px;
            color: #ff3131;
            z-index: 10;
        }

        .panel {
            position: absolute;
            background: rgba(25, 25, 25, 0.9);
            border: 1px solid #444;
            padding: 15px;
            z-index: 10;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.8);
        }

        .panel h2 {
            color: #ff3131;
            margin: 0 0 15px 0;
            font-size: 26px;
            text-decoration: underline;
        }

        .panel button {
            display: block;
            width: 100%;
            margin: 10px 0;
            background: #39d353;
            border: none;
            padding: 12px;
            font-family: 'Almendra', serif;
            font-weight: bold;
            font-size: 18px;
            color: black;
            cursor: pointer;
            text-align: center;
        }

        /* POSITIONEN DER BOXEN EXAKT WIE IM BILD */
        #personal { left: 30px; top: 30px; width: 220px; }
        #blacklist { left: 30px; top: 380px; width: 220px; }
        
        #blacklistAdmin { left: 30px; bottom: 30px; width: 440px; }
        #blacklistAdmin .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        #admin { right: 30px; top: 150px; width: 250px; background: rgba(40,40,40,0.9); }
        
        #elo { left: 550px; bottom: 30px; width: 250px; }

        #chat-btn {
            position: absolute;
            right: 40px;
            bottom: 40px;
            background: #ff8c00;
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            color: black;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

    </style>
</head>
<body>

<!-- STARTSEITE -->
<div id="start">
    <div id="loginBar" onclick="openLogin()">Login</div>
    <div id="logo-container">
        <img src="bulls_start.jpg" alt="Dark Bulls Logo">
    </div>
    <div id="menu">
        <button class="btn youtube" onclick="openYouTube()">YouTube</button>
        <button class="btn story" onclick="openStory()">Histories</button>
        <button class="btn web" onclick="openWeb()">Internet</button>
    </div>
</div>

<!-- LOGIN MODAL -->
<div id="pinModal">
    <div id="pinBox">
        <h1>Anmeldung</h1>
        <label>Name</label>
        <input type="text" id="nameInput">
        <label>PIN</label>
        <input type="password" id="pinInput">
        <div style="display: flex; justify-content: space-between;">
            <button class="loginBtn green" onclick="login()">Login</button>
            <button class="loginBtn yellow" onclick="help()">Hilfe</button>
            <button class="loginBtn red" onclick="closeLogin()">X</button>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
    <img src="bulls_dashboard.jpg" id="bg-bull">
    
    <div id="userInfo">Ich bin Angemeldet als: <span id="userRole">Admin</span></div>

    <div class="panel" id="personal">
        <h2>Persönlicher Bereich</h2>
        <button>Pin ändern</button>
        <button>Statistiken</button>
        <button>Tipps</button>
    </div>

    <div class="panel" id="blacklist">
        <h2>Black Liste</h2>
        <button>Sp. Melden</button>
        <button>Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Black Liste Pflege</h2>
        <div class="grid">
            <button style="font-size: 14px;">Gemeldete Spieler bearbeiten</button>
            <button>Blackliste Pflege</button>
            <button>Spieler Eintragen</button>
            <button>Volle Ansicht</button>
        </div>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
        <button>Einheiten Rechner</button>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button onclick="openCreatePlayer()">Spieler Einstellungen</button>
        <button>Statistiken</button>
    </div>

    <button id="chat-btn">Chat</button>
</div>

<!-- SPIELER ANLEGEN MODAL -->
<div id="createPlayer" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:2000;">
    <div id="pinBox" style="width:400px;">
        <h1>Spieler anlegen</h1>
        <label>Spielername</label>
        <input type="text" id="p_name">
        <div style="display: flex; gap: 10px;">
            <button class="loginBtn green" style="width:100%" onclick="savePlayer()">Speichern</button>
            <button class="loginBtn yellow" style="width:100%" onclick="closeCreatePlayer()">Zurück</button>
        </div>
    </div>
</div>

<script>
    let users = [
        { name: "Admin", pin: "1234", role: "Admin" },
        { name: "Offizier", pin: "2222", role: "Officer" },
        { name: "Elo", pin: "3333", role: "Elo" },
        { name: "Gast", pin: "0000", role: "Guest" }
    ];

    function openLogin() { document.getElementById("pinModal").style.display = "flex"; }
    function closeLogin() { document.getElementById("pinModal").style.display = "none"; }
    
    function login() {
        let name = document.getElementById("nameInput").value;
        let pin = document.getElementById("pinInput").value;
        let user = users.find(u => u.name === name && u.pin === pin);

        if (user) {
            document.getElementById("start").style.display = "none";
            closeLogin();
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userRole").innerText = user.role;
            
            // Berechtigungen
            if (user.role !== "Admin") document.getElementById("admin").style.display = "none";
        } else {
            alert("Zugriff verweigert!");
        }
    }

    function openCreatePlayer() { document.getElementById("createPlayer").style.display = "flex"; }
    function closeCreatePlayer() { document.getElementById("createPlayer").style.display = "none"; }
    
    function savePlayer() {
        alert("Spieler " + document.getElementById("p_name").value + " wurde im System gespeichert.");
        closeCreatePlayer();
    }

    function openYouTube() { window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank"); }
    function openWeb() { window.open("https://darkbulls.jimdofree.com/", "_blank"); }
    function openStory() { alert("Historie wird geladen..."); }
    function help() { alert("Standard-PINs: Admin: 1234, Gast: 0000"); }
</script>

</body>
</html>
