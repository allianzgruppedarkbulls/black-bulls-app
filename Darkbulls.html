<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Bulls Startseite</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;

      /* Hintergrund (Bulls Bild einfügen) */
      background-image: url("https://via.placeholder.com/1920x1080");
      background-size: cover;
      background-position: center;
      position: relative;
    }

    /* dunkles Overlay für bessere Sicht */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    /* LOGIN BUTTON */
    .login {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1;
    }

    .login button {
      padding: 10px 20px;
      background: #111;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    /* BOTTOM NAV */
    .nav {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-bottom: 30px;
      z-index: 1;
    }

    .nav button {
      padding: 15px 25px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      cursor: pointer;
      min-width: 120px;
    }

    .nav button:hover,
    .login button:hover {
      background: rgba(255,255,255,0.2);
    }

  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login">
    <button onclick="alert('Login Klick')">Login</button>
  </div>

  <!-- BOTTOM BUTTONS -->
  <div class="nav">
    <button>Button 1</button>
    <button>Button 2</button>
    <button>Button 3</button>
  </div>

</body>
</html>
