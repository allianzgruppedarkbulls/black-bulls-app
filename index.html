<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* LOGIN BUTTON */
#loginBar {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #39d353;
    padding: 12px 60px;
    font-size: 24px;
    font-weight: bold;
    color: black;
    cursor: pointer;
}

/* LOGO */
#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#logo img {
    width: 600px;
    max-width: 80vw;
}

/* BUTTONS */
#menu {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 120px;
}

.btn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.youtube { background: orange; }
.story { background: #5b5bff; }
.web { background: #00cfd1; }

/* 🔐 PIN MODAL */
#pinModal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

#pinBox {
    background: #111;
    padding: 30px;
    text-align: center;
}

#pinInput {
    padding: 10px;
    font-size: 18px;
    margin-top: 10px;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN BUTTON -->
<div id="loginBar" onclick="openLogin()">Login</div>

<!-- 🐂 LOGO -->
<div id="logo">
    <img src="bulls.jpg">
</div>

<!-- 🔘 MENU -->
<div id="menu">
    <button class="btn youtube" onclick="openYouTube()">YouTube</button>
    <button class="btn story" onclick="openStory()">Histories</button>
    <button class="btn web" onclick="openWeb()">Internet</button>
</div>

<!-- 🔐 PIN POPUP -->
<div id="pinModal">
    <div id="pinBox">
        <h2>PIN eingeben</h2>
        <input type="password" id="pinInput"><br><br>
        <button onclick="checkPin()">Login</button>
    </div>
</div>

<script>

// 🔐 USER LISTE
let users = [
    { name: "Admin", pin: "1234" },
    { name: "Support", pin: "2222" }
];

// LOGIN POPUP
function openLogin() {
    document.getElementById("pinModal").style.display = "flex";
}

// PIN CHECK
function checkPin() {
    let pin = document.getElementById("pinInput").value;
    let user = users.find(u => u.pin === pin);

    if (user) {
        alert("Willkommen " + user.name);
        // 👉 später: weiterleitung auf interne seite
    } else {
        alert("Falscher PIN");
    }
}

// LINKS
function openYouTube() {
    window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank");
}

function openWeb() {
    window.open("https://darkbulls.jimdofree.com/", "_blank");
}

function openStory() {
    alert("Story kommt hier rein");
}

</script>

</body>
</html>
