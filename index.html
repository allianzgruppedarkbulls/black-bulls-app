<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* =========================
   STARTSEITE
========================= */
#start {
    display: block;
}

#loginBar {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #39d353;
    padding: 12px 60px;
    font-size: 24px;
    font-weight: bold;
    color: black;
    cursor: pointer;
}

#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#logo img {
    width: 780px;
    max-width: 90vw;
}

#menu {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 120px;
}

.btn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.youtube { background: orange; }
.story { background: #5b5bff; }
.web { background: #00cfd1; }

/* =========================
   LOGIN
========================= */
#loginModal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

#loginBox {
    background: #111;
    padding: 40px;
    width: 400px;
    border: 2px solid #555;
}

#loginBox input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    background: black;
    color: white;
    border: 2px solid #aaa;
}

.loginBtn {
    width: 100%;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #00c853;
}

/* =========================
   DASHBOARD
========================= */
#dashboard {
    display: none;
}

#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black url("bulls_dashboard.jpg") center no-repeat;
    background-size: 780px;
    z-index: -1;
}

.panel {
    position: absolute;
    background: rgba(0,0,0,0.7);
    padding: 15px;
}

.panel h2 {
    color: red;
}

.panel button {
    display: block;
    margin: 10px 0;
    background: #39d353;
    border: none;
    padding: 10px;
}

/* POSITIONEN */
#personal { top: 50px; left: 20px; }
#blacklist { top: 250px; left: 20px; }
#elo { bottom: 50px; right: 200px; }

#userInfo {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
}
</style>

</head>

<body>

<!-- 🟢 STARTSEITE -->
<div id="start">

<div id="loginBar" onclick="openLogin()">Login</div>

<div id="logo">
    <img src="bulls_start.jpg">
</div>

<div id="menu">
    <button class="btn youtube">YouTube</button>
    <button class="btn story">Histories</button>
    <button class="btn web">Internet</button>
</div>

</div>

<!-- 🔐 LOGIN -->
<div id="loginModal">
    <div id="loginBox">

        <h2>Login</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="password" id="pin" placeholder="PIN">

        <button class="loginBtn" onclick="login()">Anmelden</button>

    </div>
</div>

<!-- 🔥 DASHBOARD -->
<div id="dashboard">

<div id="bg"></div>

<div id="userInfo">
    Eingeloggt als: <span id="role">Gast</span>
</div>

<div class="panel" id="personal">
    <h2>Persönlich</h2>
    <button>PIN ändern</button>
    <button>Statistiken</button>
</div>

<div class="panel" id="blacklist">
    <h2>Black Liste</h2>
    <button>Spieler melden</button>
    <button>Anschauen</button>
</div>

<div class="panel" id="elo">
    <h2>Elo</h2>
    <button>Rechner</button>
</div>

</div>

<script>

const users = [
    { name: "Admin", pin: "1234", role: "Admin" }
];

function openLogin() {
    document.getElementById("loginModal").style.display = "flex";
}

function login() {

    let name = document.getElementById("name").value;
    let pin = document.getElementById("pin").value;

    let user = users.find(u => u.name === name && u.pin === pin);

    if (user) {

        document.getElementById("start").style.display = "none";
        document.getElementById("loginModal").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("role").innerText = user.role;

    } else {
        alert("Falsche Daten!");
    }
}

</script>

</body>
</html>
