<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
    overflow: hidden;
}

/* 🔐 LOGIN OBEN */
#loginBar {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: #39d353;
    padding: 12px 60px;
    font-size: 24px;
    font-weight: bold;
    color: black;
    border-radius: 4px;
    text-shadow: 1px 1px 2px black;
}

/* 🐂 LOGO MITTE */
#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#logo img {
    width: 600px;
    max-width: 80vw;
}

/* 🔘 BUTTONS UNTEN */
#menu {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 120px;
}

/* 🔘 BUTTON STYLE */
.btn {
    padding: 15px 40px;
    font-size: 22px;
    font-weight: bold;
    border: none;
    cursor: pointer;
    border-radius: 4px;
    text-shadow: 2px 2px 3px black;
}

/* 🎨 BUTTON FARBEN */
.youtube {
    background: orange;
    color: black;
}

.story {
    background: #5b5bff;
    color: black;
}

.web {
    background: #00cfd1;
    color: black;
}

/* 🔥 HOVER EFFEKT */
.btn:hover {
    transform: scale(1.1);
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBar">Login</div>

<!-- 🐂 LOGO -->
<div id="logo">
    <img src="bulls.jpg">
</div>

<!-- 🔘 MENU -->
<div id="menu">
    <button class="btn youtube" onclick="openYouTube()">YouTube</button>
    <button class="btn story" onclick="openStory()">Histories</button>
    <button class="btn web" onclick="openWeb()">Internet</button>
</div>

<script>

function openYouTube() {
    window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank");
}

function openWeb() {
    window.open("https://darkbulls.jimdofree.com/", "_blank");
}

function openStory() {
    alert("Hier kommt deine Geschichte rein (bauen wir gleich als richtiges Fenster)");
}

</script>

</body>
</html>
