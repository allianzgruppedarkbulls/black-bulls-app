<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dark Bulls - Dashboard V2.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; }
        #loginBar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #39d353; padding: 60px 15px; font-size: 24px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; box-shadow: 5px 0 15px rgba(0,255,0,0.2); }
        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .info-btn { padding: 30px 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 15px 0 0 15px; width: 60px; text-align: center; transition: 0.3s; }
        #btn-yt { background: #ff8c00; color: black; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; color: black; }
        #logo-container img { width: 780px; max-width: 70vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); z-index: 5; }
        .modal-overlay { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 40px; width: 450px; border: 2px solid #333; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 20px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 15px; background: #39d353; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; font-size: 20px; }
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; z-index: 10; }
        #bg-bull { position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.5; }
        #top-bar { position: absolute; top: 20px; right: 40px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        .panel { position: absolute; background: rgba(20, 20, 20, 0.95); border: 1px solid #444; padding: 15px; z-index: 50; border-radius: 5px; }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button id="btn-yt" class="info-btn" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button id="btn-hist" class="info-btn" onclick="alert('Histories folgen!')">HISTORIES</button>
        <button id="btn-web" class="info-btn" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1 style="color:#ff3131; text-decoration: underline;">ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Spielername">
        <input type="password" id="pinInput" placeholder="PIN">
        <button class="login-btn" onclick="login()">ANMELDEN</button>
        <p onclick="document.getElementById('pinModal').style.display='none'" style="color:red; cursor:pointer; margin-top:15px;">Abbrechen</p>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 22px; color:#39d353"><span id="userName"></span> | <span id="userRole"></span></div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 25px; cursor:pointer; font-family:'Almendra';">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">
    <div class="panel" id="adminPanel" style="right:40px; top:100px; border-color:#ffd600; width:260px; display:none;">
        <h2 style="color:#ffd600">Admin Bereich</h2>
        <button style="width:100%; padding:10px; background:#ffd600; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="alert('System bereit für Julian & Co!')">Einstellungen</button>
    </div>
</div>

<script>
    // --- AKTUELLE DATEN FÜR BLATT 1188820112 ---
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID = '1188820112'; 
    const READ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzk-xY2QN3-BiYRPLiriQnWGILfl3809vFjCvyJMWrKMiTuy4lqtvEJBcnDM7GPzPYnMQ/exec';

    let users = [];

    async function init() {
        try {
            console.log("Verbinde zu Blatt 1188820112...");
            const res = await fetch(READ_URL);
            const data = await res.text();
            
            const rows = data.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
            });
            
            console.log("System bereit! Geladen: " + users.length + " Spieler.");
        } catch (e) {
            console.error("Cloud-Verbindungsfehler");
        }
    }

    function login() {
        const n = document.getElementById("nameInput").value.trim().toLowerCase();
        const p = document.getElementById("pinInput").value.trim();
        
        if (users.length === 0) {
            alert("Daten werden noch geladen...");
            return;
        }

        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);
        if (u) {
            document.getElementById("start").style.display = "none";
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userName").innerText = u.name;
            document.getElementById("userRole").innerText = u.role;
            if (u.role === "Admin") document.getElementById("adminPanel").style.display = "block";
        } else {
            alert("Name oder PIN falsch!");
        }
    }

    window.onload = init;
</script>
</body>
</html>
