<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V14.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        
        /* --- DASHBOARD & HINTERGRUND --- */
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; background: black; }
        #bg-bull { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 700px; max-width: 80vw; z-index: 1; opacity: 0.4; pointer-events: none; }
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; padding: 10px 40px; z-index: 100; background: rgba(0,0,0,0.8); height: 60px; align-items: center; box-sizing: border-box; border-bottom: 1px solid #333; }
        
        /* --- PANELS POSITIONEN --- */
        .panel { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; position: absolute; box-sizing: border-box; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; text-align: center; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; }

        @media (min-width: 801px) {
            #personal { left: 40px; top: 80px; }
            #blacklistPanel { left: 40px; top: 320px; }
            #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
            #admin { right: 40px; top: 120px; width: 260px; }
            #elo { right: 40px; top: 420px; width: 260px; }
        }

        /* --- CHAT BUTTON --- */
        #chat-btn { position: fixed; bottom: 30px; right: 40px; padding: 15px 40px; background: #ff8c00; color: black; font-family: 'Almendra'; font-weight: bold; font-size: 24px; border: none; border-radius: 8px; cursor: pointer; z-index: 100; display: none; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .bl-box { width: 95%; max-width: 1100px; background: #111; border: 2px solid #333; padding: 25px; border-radius: 10px; }
        .bl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; text-align: left; }
        .bl-grid p { margin: 5px 0; font-size: 18px; font-weight: bold; border-bottom: 1px solid #222; }
        .bl-grid input, .bl-grid select { background: #000; border: 1px solid #444; color: #39d353; padding: 5px; font-family: 'Almendra'; width: 130px; float: right; }
        .story-box { background: #000; border: 1px solid #444; padding: 15px; color: #39d353; min-height: 100px; border-radius: 5px; margin-top: 10px; font-size: 18px; white-space: pre-wrap; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="start" style="display:flex; align-items:center; justify-content:center; height:100vh;">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'" style="position:absolute; left:0; top:35%; background:#39d353; padding:30px 5px; cursor:pointer; border-radius:0 10px 10px 0; writing-mode:vertical-rl; text-orientation:upright; font-weight:bold; color:black;">LOGIN</div>
    <img src="bulls_start.jpg" style="width:750px; max-width:75vw;">
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> | <span id="userRoleDisplay"></span></div>
        <button onclick="location.reload()" style="background:red; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:15px; border-radius:5px;">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button>Support Chat</button><button>Pin ändern</button>
    </div>

    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button onclick="openBlacklist()">Anschauen</button>
        <button onclick="document.getElementById('reportModal').style.display='flex'">Spieler Melden</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Pflege Admin</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <button style="background:#5b5bff; color:white;">Gemeldete</button><button>Pflege</button>
            <button>Eintragen</button><button onclick="openFullGrid()">Volle Ansicht</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button onclick="document.getElementById('groupMgmtModal').style.display='flex'" id="btn-mgmt" style="background:#ffd600; display:none;">Gruppen Mgmt</button>
        <button>User Verwaltung</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
    </div>

    <button id="chat-btn" onclick="alert('Chat öffnet...')">ALLIANZ CHAT</button>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="dark-modal" style="background:#1a1a1a; padding:25px; border:3px solid #333; text-align:center; border-radius:12px; width:400px;">
        <h1 style="color:#ff3131">Anmeldung</h1>
        <input type="text" id="nameInput" placeholder="Name..." style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="pinInput" placeholder="PIN..." style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="doLogin()" style="width:100%; background:#39d353; padding:15px; border:none; font-weight:bold; cursor:pointer;">ANMELDEN</button>
    </div>
</div>

<div id="reportModal" class="modal-overlay">
    <div class="bl-box">
        <h1 style="color:#ff8c00; text-align:center; margin-top:0;">SPIELER MELDEN (GEGENLISTE)</h1>
        <div class="bl-grid">
            <div>
                <p>Spieler ID <input type="text" id="repID"></p>
                <p>Allianz <input type="text" id="repAlly"></p>
                <p>Verstoß <select id="repReason"><option value="Verrat">Verrat</option><option value="Spionage">Spionage</option><option value="Beleidigung">Beleidigung</option></select></p>
            </div>
            <div>
                <p>Spielername <input type="text" id="repName"></p>
                <p>Punktestand <input type="number" id="repPunkte"></p>
                <p>Meistgesp. Map <input type="text" id="repMap"></p>
            </div>
            <div>
                <p>Datum Event <input type="date" id="repDate"></p>
                <p>Beweis vorh.? <select id="repBeweis"><option value="Ja">Ja</option><option value="Nein">Nein</option></select></p>
                <p>Beweis Link <input type="text" id="repLink"></p>
            </div>
        </div>
        <p style="color:#ffbd00; font-weight:bold; margin-top:10px;">Beschreibung / Story:</p>
        <textarea id="repStory" class="story-box"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button onclick="submitReport()" style="flex:1; background:#39d353; padding:15px; border:none; font-weight:bold; cursor:pointer;">ABSENDEN</button>
            <button onclick="document.getElementById('reportModal').style.display='none'" style="flex:1; background:red; color:white; border:none; cursor:pointer;">ABBRECHEN</button>
        </div>
    </div>
</div>

<div id="groupMgmtModal" class="modal-overlay">
    <div class="bl-box" style="max-width:500px;">
        <h1 style="color:#ffd600; text-align:center;">Gruppen & Archiv</h1>
        <input type="text" placeholder="Name der Karte..." style="width:100%; padding:10px; margin-bottom:10px; background:black; color:white; border:1px solid #444;">
        <input type="text" placeholder="Discord Webhook..." style="width:100%; padding:10px; margin-bottom:10px; background:black; color:white; border:1px solid #444;">
        <button onclick="document.getElementById('groupMgmtModal').style.display='none'" style="width:100%; background:red; color:white; padding:12px; border:none; cursor:pointer;">SCHLIESSEN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'DEINE_APPS_SCRIPT_URL_HIER_EINTRAGEN'; // WICHTIG FÜR DAS SCHREIBEN
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';

    let users = []; let myName = ""; let myRole = "";

    async function loadData() {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}&t=${new Date().getTime()}`);
        const text = await res.text();
        users = text.split('\n').slice(1).map(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            return { name: c[0].replace(/"/g,"").trim(), pin: c[2].replace(/"/g,"").trim(), role: c[3].replace(/"/g,"").trim() };
        });
    }

    function doLogin() {
        const nInput = document.getElementById("nameInput").value.trim().toLowerCase();
        const pInput = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === nInput && x.pin === pInput);
        if (u) {
            myName = u.name; myRole = u.role;
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userNameDisplay").innerText = myName;
            document.getElementById("userRoleDisplay").innerText = myRole;
            document.getElementById("chat-btn").style.display = "block";
            if(myRole === "Admin") document.getElementById("btn-mgmt").style.display = "block";
            setTimeout(() => { document.querySelectorAll('.panel').forEach(p => p.classList.add('visible')); }, 300);
        } else { alert("Login fehlgeschlagen!"); }
    }

    async function submitReport() {
        const data = {
            id: document.getElementById('repID').value,
            name: document.getElementById('repName').value,
            allianz: document.getElementById('repAlly').value,
            punkte: document.getElementById('repPunkte').value,
            verstoss: document.getElementById('repReason').value,
            map: document.getElementById('repMap').value,
            datum: document.getElementById('repDate').value,
            beweis: document.getElementById('repLink').value,
            story: document.getElementById('repStory').value,
            melder: myName
        };

        if(!data.name) return alert("Bitte mindestens den Namen angeben!");

        const btn = event.target; btn.innerText = "Sende..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', cache: 'no-cache', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            alert("Meldung wurde im System gespeichert!");
            document.getElementById('reportModal').style.display = 'none';
        } catch (e) { alert("Fehler beim Senden!"); }
        btn.innerText = "ABSENDEN"; btn.disabled = false;
    }

    window.onload = loadData;
</script>
</body>
</html>
