<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V9.3</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        
        /* STARTSEITE */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        
        #loginBar { position: absolute; left: 0; top: 35%; transform: translateY(-50%); background: #39d353; padding: 30px 5px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }
        #regBar { position: absolute; left: 0; top: 65%; transform: translateY(-50%); background: #ffd600; padding: 25px 5px; font-size: 14px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 40px; text-align: center; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .dark-modal { background: #1a1a1a; padding: 30px; width: 450px; max-width: 90vw; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 50px rgba(255,0,0,0.4); }
        .dark-modal input, .dark-modal textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; outline: none; border-radius: 4px; }
        .logbtn { padding: 15px; border: none; cursor: pointer; font-family: 'Almendra'; font-weight: bold; font-size: 18px; border-radius: 5px; color: black; width: 100%; }

        /* DASHBOARD */
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; overflow: hidden; }
        #bg-bull { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 850px; max-width: 90vw; z-index: 1; opacity: 0.3; pointer-events: none; }
        
        #top-bar { position: absolute; top: 0; width: 100%; display: flex; justify-content: flex-end; align-items: center; padding: 15px 40px; z-index: 100; background: rgba(0,0,0,0.8); box-sizing: border-box; border-bottom: 1px solid #333; }
        
        .panel { display: none; background: rgba(15, 15, 15, 0.9); border: 1px solid #444; padding: 15px; z-index: 10; border-radius: 8px; width: 250px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .panel h2 { color: #ff3131; margin: 0 0 10px 0; font-size: 22px; text-decoration: underline; text-align: center; }
        .panel button { display: block; width: 100%; margin: 8px 0; background: #39d353; border: none; padding: 12px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; transition: 0.2s; }
        .panel button:hover { background: #2fb144; transform: scale(1.02); }

        /* BLACKLIST DESIGN */
        .bl-box { width: 95%; max-width: 1200px; background: #111; border: 2px solid #333; padding: 30px; border-radius: 10px; overflow-y: auto; max-height: 90vh; }
        .bl-header { color: #ff3131; font-size: clamp(30px, 5vw, 55px); text-align: center; margin-bottom: 20px; font-weight: bold; }
        .bl-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; text-align: left; }
        .bl-grid p { margin: 8px 0; font-size: 18px; font-weight: bold; border-bottom: 1px solid #222; }
        .bl-grid span { color: #39d353; margin-left: 10px; float: right; }
        .story-box { background: #000; border: 1px solid #444; padding: 15px; min-height: 80px; color: #39d353; font-size: 20px; margin-top: 10px; border-radius: 5px; }

        /* POSITIONEN DESKTOP */
        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 50px; top: 100px; }
            #blacklistPanel { left: 50px; top: 400px; }
            #blacklistAdmin { left: 50px; bottom: 50px; width: 450px; }
            #admin { right: 50px; top: 100px; }
            #elo { right: 50px; top: 400px; }
        }

        /* MOBILE OPTIMIERUNG */
        @media (max-width: 800px) {
            #dashboard { overflow-y: auto; display: none; flex-direction: column; align-items: center; padding-top: 80px; }
            .panel { position: relative !important; width: 90% !important; margin: 10px 0 !important; left: auto !important; right: auto !important; top: auto !important; bottom: auto !important; display: block; }
            #bg-bull { display: none; }
        }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('loginModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="document.getElementById('regModal').style.display='flex'">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
</div>

<div id="loginModal" class="modal-overlay">
    <div class="dark-modal">
        <h1 style="color:#ff3131">Anmeldung</h1>
        <div id="loadingInfo" style="color:#ffd600; margin-bottom:10px;">Lade Bulls-Cloud...</div>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div style="display:flex; gap:10px;">
            <button class="logbtn" style="background:#39d353" onclick="doLogin()">Anmelden</button>
            <button class="logbtn" style="background:#d50000; color:white" onclick="document.getElementById('loginModal').style.display='none'">Abbruch</button>
        </div>
    </div>
</div>

<div id="regModal" class="modal-overlay">
    <div class="dark-modal">
        <h1 style="color:#ff3131">Rekrutierung</h1>
        <input type="text" id="regName" placeholder="Name">
        <textarea id="regMsg" placeholder="Nachricht an die Führung..."></textarea>
        <button class="logbtn" style="background:#ffd600" onclick="sendDiscordBewerbung()">Abschicken</button>
        <button class="logbtn" style="background:#d50000; color:white; margin-top:10px;" onclick="document.getElementById('regModal').style.display='none'">Abbruch</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131; font-weight:bold;"><span id="userNameDisplay"></span> | <span id="userRoleDisplay"></span></div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:10px 20px; cursor:pointer; margin-left:20px; border-radius:5px; font-family:'Almendra'; font-weight:bold;">LOGOUT</button>
    </div>
    
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button onclick="alert('Support-System aktiv via Discord')">Support Ticket</button>
        <button>Statistiken</button>
    </div>

    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button onclick="openBlacklist()">Anschauen</button>
        <button>Sp. Melden</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Admin Bereich</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px;">
            <button>Eintragen</button><button>Pflege</button>
            <button>User-Verw.</button><button>Logs</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>System</h2>
        <button>Global Settings</button>
        <button>Cloud Sync</button>
    </div>

    <div class="panel" id="elo">
        <h2>Elo</h2>
        <button>Rohstoffrechner</button>
    </div>
</div>

<div id="blacklistModal" class="modal-overlay">
    <div class="bl-box">
        <div class="bl-header">DARK BULLS BLACK LISTE</div>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input list="playerList" id="blSearchInput" placeholder="Spieler suchen..." style="flex:1; padding:12px; background:black; color:#39d353; border:1px solid #444;">
            <datalist id="playerList"></datalist>
            <button class="logbtn" style="width:150px; background:#39d353" onclick="loadBlacklistPlayer()">Laden</button>
        </div>
        <div class="bl-grid">
            <div><p>ID <span id="outID">-</span></p><p>Name <span id="outName">-</span></p></div>
            <div><p>Allianz <span id="outAllianz">-</span></p><p>Punkte <span id="outPunkte">-</span></p></div>
            <div><p>Verstoß <span id="outVerstoss">-</span></p><p>Fall <span id="outFall">-</span></p></div>
        </div>
        <div id="outStory" class="story-box">Beschreibung folgt...</div>
        <button class="logbtn" style="background:#ffbd00; margin-top:20px;" onclick="document.getElementById('blacklistModal').style.display='none'">Schließen</button>
    </div>
</div>

<script>
    const WEBHOOK_BEWERBUNG = "https://discord.com/api/webhooks/1502735246335021267/fpxXtWr5QgSny6rfJzGHKnhYskehC9vDMEl3CvUzjgbBOuKBd8KGzUhCRfvd2KmWcnND";
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';
    const GID_BLACKLIST = '1767725514';

    let users = []; let blacklistData = []; let ready = false;

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const cl = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: cl(c[0]), pin: cl(c[2]), role: cl(c[3]) };
            });
            ready = true;
            document.getElementById("loadingInfo").innerText = "Bulls-Cloud verbunden! ✓";
            document.getElementById("loadingInfo").style.color = "#39d353";
        } catch (e) {
            document.getElementById("loadingInfo").innerText = "Verbindungsfehler!";
        }
    }

    function doLogin() {
        if(!ready) return;
        const n = document.getElementById("nameInput").value.trim().toLowerCase();
        const p = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);

        if (u) {
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            const dash = document.getElementById("dashboard");
            dash.style.display = (window.innerWidth <= 800) ? "flex" : "block";
            
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;

            // Panels einblenden basierend auf Rolle
            const panels = document.querySelectorAll('.panel');
            panels.forEach(panel => {
                if(u.role === "Admin") {
                    panel.style.display = "block";
                } else if (panel.id === "personal" || (panel.id === "blacklistPanel" && u.role !== "Gast")) {
                    panel.style.display = "block";
                }
            });
        } else {
            alert("Login fehlgeschlagen!");
        }
    }

    async function openBlacklist() {
        document.getElementById('blacklistModal').style.display = 'flex';
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_BLACKLIST}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const listEl = document.getElementById('playerList');
        listEl.innerHTML = ""; blacklistData = [];
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
            if(c[1]) {
                blacklistData.push(c);
                let opt = document.createElement('option');
                opt.value = c[1] + " | " + c[2];
                listEl.appendChild(opt);
            }
        });
    }

    function loadBlacklistPlayer() {
        const search = document.getElementById('blSearchInput').value.split(" | ")[0];
        const p = blacklistData.find(row => row[1] === search);
        if(p) {
            document.getElementById('outID').innerText = p[1];
            document.getElementById('outName').innerText = p[2];
            document.getElementById('outAllianz').innerText = p[5];
            document.getElementById('outVerstoss').innerText = p[6];
            document.getElementById('outFall').innerText = p[12];
            document.getElementById('outStory').innerText = p[13];
            document.getElementById('outPunkte').innerText = p[16];
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
