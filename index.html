<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V4.6</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="/192x192icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        
        /* --- STARTSEITE --- */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; }
        #logo-container { position: relative; z-index: 1; pointer-events: none; }
        #logo-container img { width: 750px; max-width: 70vw; filter: drop-shadow(0 0 50px rgba(255, 0, 0, 0.8)); }
        
        .left-menu { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .side-btn-left { background: #39d353; padding: 40px 10px; font-size: 20px; font-weight: bold; color: black; cursor: pointer; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; width: 55px; text-align: center; border: none; box-shadow: 5px 0 15px rgba(0,255,0,0.3); }
        #regBar { background: #ffd600; padding: 30px 10px; font-size: 16px; box-shadow: 5px 0 15px rgba(255,214,0,0.3); }

        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 100; }
        .info-btn { padding: 25px 10px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 15px 0 0 15px; width: 55px; text-align: center; color: black; min-height: 140px; }
        #btn-yt { background: #ff8c00; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; }

        /* --- MODALS (FIXED DESIGN) --- */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 35px; width: 420px; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 40px rgba(255,0,0,0.4); }
        .modal-box h1 { color: #ff3131; text-decoration: underline; margin-bottom: 25px; font-size: 32px; letter-spacing: 2px; }
        
        /* Eingabefelder Style */
        .modal-box input { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            background: #000; color: #39d353; border: 1px solid #444; 
            font-family: 'Almendra'; font-size: 20px; box-sizing: border-box; 
            outline: none; border-radius: 4px;
        }
        .modal-box input::placeholder { color: #555; }
        
        /* Buttons im Modal */
        .modal-btn-row { display: flex; justify-content: space-between; gap: 10px; margin-top: 10px; }
        .m-btn { 
            flex: 1; padding: 15px; border: none; cursor: pointer; 
            font-family: 'Almendra'; font-weight: bold; font-size: 18px; 
            border-radius: 5px; color: black; transition: 0.2s; 
        }
        .m-btn:active { transform: scale(0.95); }
        .btn-green { background: #39d353; }
        .btn-yellow { background: #ffd600; }
        .btn-red { background: #d50000; color: white; }

        /* --- DASHBOARD (FIXED POSITIONS) --- */
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; }
        #bg-bull-dashboard { position: absolute; left: 50%; top: 48%; transform: translate(-50%, -50%); width: 750px; z-index: 1; opacity: 0.35; pointer-events: none; }
        #top-right-nav { position: absolute; top: 25px; right: 40px; display: flex; align-items: center; gap: 20px; z-index: 100; }
        
        .panel-fixed { position: absolute; background: rgba(15, 15, 15, 0.95); border: 2px solid #222; padding: 15px; z-index: 10; border-radius: 10px; width: 280px; }
        .panel-fixed h2 { color: #ff3131; margin: 0 0 15px 0; font-size: 24px; text-decoration: underline; }
        .panel-fixed button { display: block; width: 100%; margin: 10px 0; background: #39d353; border: none; padding: 12px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 5px; font-size: 18px; }

        #personal { left: 40px; top: 50px; }
        #blacklist { left: 40px; top: 380px; }
        #blacklistAdmin { left: 40px; bottom: 50px; width: 400px; }
        #admin { right: 40px; top: 120px; }
        #elo { right: 40px; top: 420px; }

        #allianz-chat-btn { position: absolute; right: 40px; bottom: 40px; background: #ff8c00; padding: 20px 60px; font-size: 28px; font-weight: bold; cursor: pointer; z-index: 10; font-family: 'Almendra'; color: black; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<div id="start">
    <div class="left-menu">
        <button class="side-btn-left" onclick="openM('pinModal')">LOGIN</button>
        <button class="side-btn-left" id="regBar" onclick="openM('regModal')">REGISTRIEREN</button>
    </div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button id="btn-yt" class="info-btn" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button id="btn-hist" class="info-btn">HISTORIES</button>
        <button id="btn-web" class="info-btn" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div class="modal-btn-row">
            <button class="m-btn btn-green" id="finalLoginBtn">Anmelden</button>
            <button class="m-btn btn-red" onclick="closeM('pinModal')">Abbruch</button>
        </div>
    </div>
</div>

<div id="regModal" class="modal-overlay">
    <div class="modal-box">
        <h1>REKRUTIERUNG</h1>
        <input type="text" id="regName" placeholder="Name">
        <input type="password" id="regPin1" placeholder="PIN wählen">
        <input type="password" id="regPin2" placeholder="PIN wiederholen">
        <input type="number" id="regAge" placeholder="Alter">
        <div class="modal-btn-row">
            <button class="m-btn btn-yellow" onclick="registerUser()">Abschicken</button>
            <button class="m-btn btn-red" onclick="closeM('regModal')">Abbruch</button>
        </div>
    </div>
</div>

<div id="dashboard">
    <div id="top-right-nav">
        <div style="font-size: 22px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:10px 25px; cursor:pointer; font-family:'Almendra'; border-radius:5px;">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull-dashboard">

    <div class="panel-fixed" id="personal">
        <h2>Persönlich</h2>
        <button>CHAT</button>
        <button>Pin ändern</button>
    </div>
    <div class="panel-fixed" id="blacklist">
        <h2>Black Liste</h2>
        <button>Anschauen</button>
    </div>
    <div class="panel-fixed" id="blacklistAdmin">
        <h2>Black Liste Pflege</h2>
        <button>Bearbeiten</button>
    </div>
    <div class="panel-fixed" id="admin">
        <h2>Admin</h2>
        <button>User-Pflege</button>
    </div>
    <div class="panel-fixed" id="elo">
        <h2>Elo Bereich</h2>
        <button>Rechner</button>
    </div>

    <button id="allianz-chat-btn">ALLIANZ CHAT</button>
</div>

<script>
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID = '1188820112'; 
    let users = [];

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
            });
        } catch (e) { console.error("Datenfehler"); }
    }

    function openM(id) { document.getElementById(id).style.display = 'flex'; }
    function closeM(id) { document.getElementById(id).style.display = 'none'; }

    async function registerUser() {
        const p1 = document.getElementById('regPin1').value;
        const p2 = document.getElementById('regPin2').value;
        if (p1 !== p2) return alert("PINs nicht identisch!");
        alert("Erfolgreich! Support wird informiert.");
        closeM('regModal');
    }

    document.getElementById("finalLoginBtn").onclick = function() {
        const name = document.getElementById("nameInput").value.trim().toLowerCase();
        const pin = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === name && x.pin === pin);

        if (u) {
            document.getElementById("start").style.display = "none";
            closeM('pinModal');
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;
            
            const show = (id) => document.getElementById(id).style.display = "block";
            const hide = (id) => document.getElementById(id).style.display = "none";
            
            hide("blacklistAdmin"); hide("admin"); hide("elo");
            
            if (u.role === "Admin") {
                show("blacklistAdmin"); show("admin"); show("elo");
            }
        } else { alert("Login falsch!"); }
    };

    window.onload = loadData;
</script>
</body>
</html>
