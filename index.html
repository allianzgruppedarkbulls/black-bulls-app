<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Allianz System V7.0</title>

    <link rel="icon" type="image/png" href="192x192icon.png">
    <link rel="apple-touch-icon" href="192x192icon.png">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; min-height: 100vh; }
        
        /* --- STARTSEITE --- */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; background: black; z-index: 10; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        
        #loginBar { position: absolute; left: 0; top: 40%; transform: translateY(-50%); background: #39d353; padding: 40px 10px; font-size: 24px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; width: 50px; text-align: center; box-shadow: 5px 0 15px rgba(0,255,0,0.3); }
        #regBar { position: absolute; left: 0; top: 70%; transform: translateY(-50%); background: #ffd600; padding: 30px 10px; font-size: 16px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; width: 50px; text-align: center; box-shadow: 5px 0 15px rgba(255,214,0,0.3); }

        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .info-btn { padding: 25px 10px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 15px 0 0 15px; width: 55px; text-align: center; color: black; min-height: 140px; }
        #btn-yt { background: #ff8c00; }
        #btn-hist { background: #5b5bff; color: white; }
        #btn-web { background: #00cfd1; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 30px; width: 450px; max-width: 85vw; border: 3px solid #333; text-align: center; border-radius: 12px; box-shadow: 0 0 50px rgba(255,0,0,0.5); }
        .modal-box h1 { color: #ff3131; text-decoration: underline; font-size: 35px; margin-bottom: 25px; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #000; color: #39d353; border: 1px solid #444; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; outline: none; border-radius: 4px; }

        /* --- DASHBOARD --- */
        #dashboard { display: none; position: relative; width: 100vw; min-height: 100vh; background: black; }
        #bg-bull { position: fixed; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; z-index: 1; opacity: 0.4; pointer-events: none; }
        #top-bar { position: fixed; top: 0; width: 100%; display: flex; justify-content: flex-end; align-items: center; padding: 10px 20px; z-index: 100; box-sizing: border-box; background: rgba(0,0,0,0.8); }
        
        .panel { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; background: rgba(15, 15, 15, 0.95); border: 1px solid #444; padding: 12px; z-index: 10; border-radius: 8px; width: 240px; }
        .panel.visible { opacity: 1; transform: translateY(0); }
        .panel h2 { color: #ff3131; margin: 0 0 8px 0; font-size: 20px; text-decoration: underline; }
        .panel button { display: block; width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; color: black; border-radius: 4px; font-size: 14px; }

        #chat-btn { position: fixed; bottom: 0; right: 0; background: #ff8c00; padding: 15px; font-size: 22px; font-weight: bold; cursor: pointer; z-index: 200; font-family: 'Almendra'; width: 100%; display: none; color: black; border: none; opacity: 0; transition: opacity 1s; }

        /* Desktop Layout */
        @media (min-width: 801px) {
            .panel { position: absolute; }
            #personal { left: 40px; top: 80px; }
            #blacklistPanel { left: 40px; top: 380px; }
            #blacklistAdmin { left: 40px; bottom: 40px; width: 440px; }
            #adminPanel { right: 40px; top: 120px; width: 260px; }
            #eloPanel { right: 40px; top: 420px; width: 260px; }
            #chat-btn { width: auto; right: 40px; bottom: 40px; border-radius: 8px; padding: 20px 60px; font-size: 28px; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        }

        /* Handy Layout */
        @media (max-width: 800px) {
            #dashboard { overflow-y: auto; display: none; flex-direction: column; align-items: center; padding-top: 70px; padding-bottom: 100px; }
            .panel { position: relative !important; width: 92% !important; left: auto !important; top: auto !important; margin: 10px auto !important; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        }

        /* Blacklist Modal Styles */
        .bl-box { width: 95%; max-width: 1100px; background: #111; border: 2px solid #333; padding: 20px; border-radius: 10px; font-family: 'Almendra'; }
        .bl-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; text-align: left; }
        .bl-grid span { color: #39d353; font-weight: bold; }
        @media (max-width: 600px) { .bl-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">LOGIN</div>
    <div id="regBar" onclick="document.getElementById('regModal').style.display='flex'">REGISTRIEREN</div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
    <div id="side-menu">
        <button class="info-btn" id="btn-yt" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="info-btn" id="btn-hist" style="background:#5b5bff; color:white;">HISTORIES</button>
        <button class="info-btn" id="btn-web" style="background:#00cfd1;" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Name...">
        <input type="password" id="pinInput" placeholder="PIN...">
        <div style="display:flex; gap:10px;">
            <button class="logbtn btn-green" style="flex:1; padding:15px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="doLogin()">Anmelden</button>
            <button class="logbtn btn-red" style="flex:1; padding:15px; border:none; font-family:'Almendra'; cursor:pointer;" onclick="document.getElementById('pinModal').style.display='none'">Abbruch</button>
        </div>
    </div>
</div>

<div id="regModal" class="modal-overlay">
    <div class="modal-box">
        <h1>REKRUTIERUNG</h1>
        <input type="text" id="regName" placeholder="Name">
        <input type="password" id="regPin1" placeholder="PIN wählen">
        <input type="password" id="regPin2" placeholder="PIN wiederholen">
        <input type="number" id="regAge" placeholder="Alter">
        <div style="display:flex; gap:10px;">
            <button class="logbtn btn-yellow" style="flex:1; padding:15px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="alert('Rekrutierung gesendet!')">Abschicken</button>
            <button class="logbtn btn-red" style="flex:1; padding:15px; border:none; font-family:'Almendra'; cursor:pointer;" onclick="document.getElementById('regModal').style.display='none'">Abbruch</button>
        </div>
    </div>
</div>

<div id="pinChangeModal" class="modal-overlay">
    <div class="modal-box">
        <h1>PIN ÄNDERN</h1>
        <div id="pinChangeForm">
            <p style="color: #39d353;">Benutzer: <span id="pinUser"></span></p>
            <input type="password" id="newPin1" placeholder="Neue PIN">
            <input type="password" id="newPin2" placeholder="Neue PIN wiederholen">
            <div style="display:flex; gap:10px;">
                <button class="logbtn btn-green" style="flex:1; padding:15px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="submitPinChange()">Speichern</button>
                <button class="logbtn btn-red" style="flex:1; padding:15px; border:none; font-family:'Almendra'; cursor:pointer;" onclick="closePinModal()">Abbruch</button>
            </div>
        </div>
        <div id="pinSuccessMessage" style="display: none;">
            <p style="color: #ffd600; font-size: 24px;">✓ PIN geändert!</p>
            <p id="displayNewPin" style="color: #39d353; font-size: 32px;"></p>
            <button class="logbtn btn-green" style="width:100%; padding:15px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="closePinModal()">Verstanden</button>
        </div>
    </div>
</div>

<div id="blacklistModal" class="modal-overlay">
    <div class="bl-box">
        <h1 style="color: #ff3131; text-align: center; font-size: 30px;">DARK BULLS BLACK LISTE</h1>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <input list="playerList" id="blSearchInput" placeholder="Suchen..." style="flex:1; padding:10px; background:black; color:#39d353; border:1px solid #555; font-family:'Almendra';">
            <datalist id="playerList"></datalist>
            <button class="logbtn btn-green" style="padding:10px 20px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="loadBlacklistPlayer()">Laden</button>
        </div>
        <div class="bl-grid">
            <div><p>ID: <span id="outID"></span></p><p>Name: <span id="outName"></span></p><p>Allianz: <span id="outAllianz"></span></p></div>
            <div><p>Verstoß: <span id="outVerstoss"></span></p><p>Fall: <span id="outFall"></span></p><p>Punkte: <span id="outPunkte"></span></p></div>
            <div><p>Beweis: <span id="outBeweis"></span></p><p>Meldung: <span id="outDateEvent"></span></p></div>
        </div>
        <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
            <p>Story: <span id="outStory" style="color:#39d353"></span></p>
        </div>
        <button class="logbtn btn-yellow" style="width:100%; margin-top:15px; padding:12px; border:none; font-family:'Almendra'; font-weight:bold; cursor:pointer;" onclick="document.getElementById('blacklistModal').style.display='none'">Schließen</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div style="font-size: 18px; color:#ff3131"><span id="userNameDisplay"></span> (<span id="userRoleDisplay"></span>)</div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 15px; cursor:pointer; margin-left:15px; border-radius:5px; font-family:'Almendra';">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">

    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button onclick="openChangePin()">Pin ändern</button>
        <button id="btn-stats">Statistiken</button>
        <button id="btn-tipps">Tipps</button>
    </div>

    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button onclick="alert('Melde-System folgt')">Sp. Melden</button>
        <button onclick="openBlacklist()">Anschauen</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Pflege Admin</h2>
        <div class="grid">
            <button style="font-size:12px">Gemeldete Spieler</button>
            <button>Pflege</button>
            <button>Eintragen</button>
            <button>Volle Ansicht</button>
        </div>
    </div>

    <div class="panel" id="adminPanel">
        <h2>Admin</h2>
        <button>User-Verwaltung</button>
        <button>Einstellungen</button>
        <button style="background:#ffd600">Hilfe-Anfragen</button>
    </div>

    <div class="panel" id="eloPanel">
        <h2>Elo Bereich</h2>
        <button>Rohstoffrechner</button>
        <button>Einheitenrechner</button>
    </div>

    <button id="chat-btn" onclick="alert('Chat folgt')">ALLIANZ CHAT</button>
</div>

<script>
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const GID_USERS = '1188820112';
    const GID_BLACKLIST = '1767725514';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzLm15M-C9GmMlCqYO63C9_T4942ZT19WMA_RkwASCzZptaSyNeZ_brizzGqjs6JAmf3Q/exec';

    let users = [];
    let blacklistData = [];

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_USERS}`);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), pin: clean(c[2]), role: clean(c[3]) };
            });
            console.log("Daten bereit.");
        } catch (e) { console.error("Cloud-Fehler!"); }
    }

    function doLogin() {
        const n = document.getElementById("nameInput").value.trim().toLowerCase();
        const p = document.getElementById("pinInput").value.trim();
        const u = users.find(x => x.name.toLowerCase() === n && x.pin === p);

        if (u) {
            document.getElementById("pinModal").style.display = "none";
            document.getElementById("start").style.display = "none";
            const dash = document.getElementById("dashboard");
            dash.style.display = window.innerWidth <= 800 ? "flex" : "block";
            document.getElementById("userNameDisplay").innerText = u.name;
            document.getElementById("userRoleDisplay").innerText = u.role;

            setTimeout(() => {
                const panels = document.querySelectorAll('.panel');
                panels.forEach((panel, index) => {
                    let showMe = false;
                    if (u.role === "Admin") showMe = true;
                    else if (panel.id === "personal") showMe = true;
                    else if (panel.id === "blacklistPanel" && u.role !== "Gast") showMe = true;
                    
                    if (showMe) {
                        panel.style.display = "block";
                        setTimeout(() => panel.classList.add('visible'), index * 120);
                    } else {
                        panel.style.display = "none";
                    }
                });
                const chat = document.getElementById("chat-btn");
                chat.style.display = "block";
                setTimeout(() => chat.style.opacity = "1", 500);
            }, 600);
        } else { alert("Login fehlgeschlagen!"); }
    }

    function openChangePin() {
        document.getElementById("pinUser").innerText = document.getElementById("userNameDisplay").innerText;
        document.getElementById("pinChangeModal").style.display = "flex";
    }

    function closePinModal() {
        document.getElementById('pinChangeModal').style.display = 'none';
        document.getElementById('pinChangeForm').style.display = 'block';
        document.getElementById('pinSuccessMessage').style.display = 'none';
    }

    async function submitPinChange() {
        const n1 = document.getElementById("newPin1").value;
        const player = document.getElementById("pinUser").innerText;
        if(n1.length < 4) return alert("PIN zu kurz!");
        const payload = { action: "updatePin", playerName: player, newPin: n1 };
        try {
            const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.text();
            if (result === "PIN geändert") {
                document.getElementById('pinChangeForm').style.display = 'none';
                document.getElementById('displayNewPin').innerText = n1;
                document.getElementById('pinSuccessMessage').style.display = 'block';
                loadData();
            }
        } catch (e) { alert("Übertragungsfehler!"); }
    }

    async function openBlacklist() {
        document.getElementById('blacklistModal').style.display = 'flex';
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID_BLACKLIST}`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        const listEl = document.getElementById('playerList');
        listEl.innerHTML = "";
        blacklistData = [];
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,"").trim());
            if(c[1]) {
                blacklistData.push(c);
                let opt = document.createElement('option');
                opt.value = c[1] + " | " + c[2];
                listEl.appendChild(opt);
            }
        });
    }

    function loadBlacklistPlayer() {
        const search = document.getElementById('blSearchInput').value.split(" | ")[0];
        const p = blacklistData.find(row => row[1] === search);
        if(p) {
            document.getElementById('outID').innerText = p[1];
            document.getElementById('outName').innerText = p[2];
            document.getElementById('outAllianz').innerText = p[5];
            document.getElementById('outVerstoss').innerText = p[6];
            document.getElementById('outFall').innerText = p[12];
            document.getElementById('outPunkte').innerText = p[16];
            document.getElementById('outStory').innerText = p[13];
            document.getElementById('outDateEvent').innerText = p[14];
            document.getElementById('outBeweis').innerText = p[15];
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
