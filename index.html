<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dark Bulls Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: black; color: white; font-family: 'Almendra', serif; overflow: hidden; }
        
        /* Startseite mit dem Bullen */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; }
        #logo-start { width: 600px; cursor: pointer; filter: drop-shadow(0 0 30px red); }

        /* Login Fenster */
        #loginModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .box { background: #111; border: 2px solid #333; padding: 40px; text-align: center; width: 350px; }
        .box h2 { color: #ff3131; text-decoration: underline; }
        .box input { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #39d353; border: 1px solid #444; font-size: 18px; }
        .btn-login { width: 100%; padding: 15px; background: #39d353; border: none; font-weight: bold; cursor: pointer; }

        /* Dashboard nach dem Login */
        #dashboard { display: none; height: 100vh; position: relative; }
        #top { position: absolute; top: 20px; right: 20px; color: #39d353; font-size: 20px; z-index: 10; }
        #main-bull { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 550px; opacity: 0.5; }

        /* Die Buttons links und rechts */
        .side { position: absolute; top: 100px; z-index: 10; }
        #left { left: 30px; }
        #right { right: 30px; }
        .panel { background: rgba(20,20,20,0.8); border: 1px solid #444; padding: 15px; margin-bottom: 20px; width: 180px; text-align: center; }
        .panel h4 { margin: 0 0 10px 0; color: #ff3131; text-decoration: underline; }
        .p-btn { width: 100%; padding: 8px; margin: 3px 0; background: #39d353; border: none; font-family: 'Almendra'; cursor: pointer; font-weight: bold; }
        .admin-btn { background: #ffd600; }
    </style>
</head>
<body>

<div id="start">
    <img src="bulls_start.jpg" id="logo-start" onclick="document.getElementById('loginModal').style.display='flex'">
</div>

<div id="loginModal">
    <div class="box">
        <h2>ANMELDUNG</h2>
        <input type="text" id="user" placeholder="Name">
        <input type="password" id="pin" placeholder="PIN">
        <button class="btn-login" onclick="checkLogin()">ANMELDEN</button>
        <p onclick="document.getElementById('loginModal').style.display='none'" style="color:red; cursor:pointer;">Abbrechen</p>
    </div>
</div>

<div id="dashboard">
    <div id="top">
        <span id="display-name"></span> | <span id="display-role"></span>
        <button onclick="location.reload()" style="background:red; color:white; border:none; cursor:pointer; margin-left:10px;">LOGOUT</button>
    </div>

    <img src="bulls_dashboard.jpg" id="main-bull">

    <div id="left" class="side">
        <div class="panel">
            <h4>Persönlich</h4>
            <button class="p-btn">Statistiken</button>
            <button class="p-btn">PIN ändern</button>
        </div>
        <div class="panel">
            <h4>Black Liste</h4>
            <button class="p-btn">Anschauen</button>
            <button class="p-btn">Melden</button>
        </div>
    </div>

    <div id="right" class="side">
        <div id="admin-box" class="panel" style="display:none; border-color:#ffd600;">
            <h4 style="color:#ffd600">Admin</h4>
            <button class="p-btn admin-btn">User-Pflege</button>
            <button class="p-btn admin-btn">Einstellungen</button>
        </div>
        <div class="panel">
            <h4>Elo Bereich</h4>
            <button class="p-btn">Elo Rechner</button>
        </div>
    </div>
</div>

<script>
    // Deine IDs von heute
    const ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    const BLATT = '1188820112'; 
    const URL = `https://docs.google.com/spreadsheets/d/${ID}/gviz/tq?tqx=out:csv&gid=${BLATT}`;

    let spielerListe = [];

    // Daten von Google holen
    fetch(URL)
        .then(res => res.text())
        .then(data => {
            const zeilen = data.split('\n').slice(1);
            spielerListe = zeilen.map(z => {
                const spalte = z.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { n: clean(spalte[0]), p: clean(spalte[2]), r: clean(spalte[3]) };
            });
            console.log("Spieler geladen");
        });

    function checkLogin() {
        const eingabeName = document.getElementById("user").value.trim().toLowerCase();
        const eingabePin = document.getElementById("pin").value.trim();
        
        const gefunden = spielerListe.find(s => s.n.toLowerCase() === eingabeName && s.p === eingabePin);

        if (gefunden) {
            document.getElementById("start").style.display = "none";
            document.getElementById("loginModal").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("display-name").innerText = gefunden.n;
            document.getElementById("display-role").innerText = gefunden.r;
            if (gefunden.r === "Admin") {
                document.getElementById("admin-box").style.display = "block";
            }
        } else {
            alert("Name oder PIN falsch!");
        }
    }
</script>
</body>
</html>
