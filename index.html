<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard V2.0 Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow: hidden; height: 100vh; }
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; }
        #loginBar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #39d353; padding: 60px 15px; font-size: 24px; font-weight: bold; color: black; cursor: pointer; z-index: 20; border-radius: 0 15px 15px 0; writing-mode: vertical-rl; text-orientation: upright; transition: 0.4s; width: 60px; text-align: center; }
        #loginBar:hover { width: 95px; padding-left: 35px; }
        #logo-container img { width: 780px; max-width: 70vw; filter: drop-shadow(0 0 60px rgba(255, 0, 0, 0.9)); }
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 40px; width: 450px; border: 2px solid #333; text-align: center; }
        .modal-box h1 { color: #ff3131; text-decoration: underline; }
        .modal-box input { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; color: #39d353; border: 1px solid #444; font-size: 20px; font-family: 'Almendra'; }
        .btn-row { display: flex; gap: 10px; }
        .loginBtn { padding: 12px; border: none; cursor: pointer; font-weight: bold; font-family: 'Almendra'; flex: 1; }
        .green { background: #39d353; color: black; }
        .red { background: #d50000; color: white; }
        .yellow { background: #ffd600; color: black; }
        #dashboard { display: none; position: relative; width: 100vw; height: 100vh; background: black; }
        #bg-bull { position: absolute; left: 50%; top: 45%; transform: translate(-50%, -50%); width: 850px; opacity: 0.3; }
        .panel { position: absolute; background: rgba(20, 20, 20, 0.9); border: 1px solid #444; padding: 15px; z-index: 10; width: 250px; }
        .panel h2 { color: #ff3131; margin: 0 0 10px 0; text-decoration: underline; }
        .panel button { width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; }
        #personal { left: 40px; top: 40px; }
        #admin { right: 40px; top: 100px; display: none; }
        #blacklistPanel { left: 40px; bottom: 40px; width: 350px; display: none; }
        #top-bar { position: absolute; top: 20px; right: 40px; display: flex; gap: 20px; z-index: 100; }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="openLogin()">LOGIN</div>
    <div id="logo-container"><img src="bulls_start.jpg" alt="Dark Bulls"></div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h1>ANMELDUNG</h1>
        <input type="text" id="nameInput" placeholder="Spielername">
        <input type="password" id="pinInput" placeholder="PIN">
        <div class="btn-row">
            <button class="loginBtn green" onclick="login()">ANMELDEN</button>
            <button class="loginBtn red" onclick="closeLogin()">ABBRUCH</button>
        </div>
    </div>
</div>

<div id="forcePinModal" class="modal-overlay">
    <div class="modal-box">
        <h1 style="color: #ffd600;">SICHERHEITS-CHECK</h1>
        <p>Deine PIN muss geändert werden.</p>
        <input type="password" id="newPin1" placeholder="Neue PIN">
        <input type="password" id="newPin2" placeholder="Wiederholen">
        <button class="loginBtn green" onclick="saveNewPin()">SPEICHERN & STARTEN</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-bar">
        <div id="statusInfo" style="color:#39d353; font-size: 22px;"></div>
        <button onclick="location.reload()" style="background:#d50000; color:white; border:none; padding:8px 20px; cursor:pointer;">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-bull">
    <div class="panel" id="personal">
        <h2>Mein Bereich</h2>
        <button onclick="alert('Statistik für ' + currentUser.name)">Statistik</button>
        <button onclick="alert('Allianz: ' + currentUser.allianz)">Meine Allianz</button>
    </div>
    <div class="panel" id="admin">
        <h2>Admin Panel</h2>
        <button class="yellow" onclick="adminResetAction()">Spieler PIN Reset</button>
    </div>
    <div class="panel" id="blacklistPanel">
        <h2>Fairplay Suche</h2>
        <input type="text" id="searchPlayer" placeholder="Spieler suchen..." style="width:90%; padding:5px; margin-bottom:10px; background:#000; color:#39d353; border:1px solid #444;">
        <button onclick="alert('Suche läuft...')">Prüfen</button>
    </div>
</div>

<script>
    // Konfiguration anhand deines Links
    const SHEET_ID = '1_zK0mf-oFYatQZ1vkf8s7A1933dM4zB-Sv8LCX-rUHU';
    const GID = '374'; 
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

    let users = [];
    let currentUser = null;

    async function fetchCloudData() {
        try {
            const response = await fetch(URL);
            if (!response.ok) throw new Error();
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            users = rows.map(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return {
                    name: clean(col[0]),      // Spalte A: Spielername 
                    allianz: clean(col[1]),   // Spalte B: Allianz 
                    pin: clean(col[2]),       // Spalte C: Pin 
                    role: clean(col[3]),      // Spalte D: Rolle 
                    needsReset: clean(col[4]) === "TRUE" // Spalte E: First Login 
                };
            });
            console.log("Synchronisiert!");
        } catch (error) {
            alert("Daten-Fehler! Bitte prüfe, ob die Google-Tabelle für 'Jeder mit dem Link' freigegeben ist.");
        }
    }

    function openLogin() { document.getElementById("pinModal").style.display = "flex"; }
    function closeLogin() { document.getElementById("pinModal").style.display = "none"; }

    function login() {
        const nameInput = document.getElementById("nameInput").value.trim().toLowerCase();
        const pinInput = document.getElementById("pinInput").value.trim();
        const user = users.find(u => u.name.toLowerCase() === nameInput && u.pin === pinInput);

        if (user) {
            currentUser = user;
            if (user.needsReset) {
                document.getElementById("pinModal").style.display = "none";
                document.getElementById("forcePinModal").style.display = "flex";
            } else {
                launchDashboard(user);
            }
        } else {
            alert("Login fehlgeschlagen!");
        }
    }

    function launchDashboard(user) {
        document.getElementById("start").style.display = "none";
        document.getElementById("pinModal").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("statusInfo").innerText = `${user.name} | ${user.role}`;

        if (user.role === "Admin") {
            document.getElementById("admin").style.display = "block";
            document.getElementById("blacklistPanel").style.display = "block";
        } else if (["Offizier", "Mitglied", "Ausbilder"].includes(user.role)) {
            document.getElementById("blacklistPanel").style.display = "block";
        }
    }

    function saveNewPin() {
        if(document.getElementById("newPin1").value === document.getElementById("newPin2").value) {
            alert("Erfolg! PIN lokal geändert. (In der echten Cloud-Tabelle muss Spalte E auf FALSE gesetzt werden)");
            location.reload();
        } else { alert("PINs nicht gleich!"); }
    }

    function adminResetAction() {
        const target = prompt("Spielername für Reset:");
        if (target) {
            const pass = Math.random().toString(36).substring(2, 6).toUpperCase();
            alert(`Kopieren für ${target}:\nHallo, dein PIN wurde auf ${pass} zurückgesetzt. Bitte nach Login ändern!`);
        }
    }

    window.onload = fetchCloudData;
</script>
</body>
</html>
