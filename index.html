<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - Dashboard V2.0 FINAL REPAIR</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* GRUNDGERÜST */
        body, html { margin: 0; padding: 0; font-family: 'Almendra', serif; background: #000; color: white; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* HINTERGRÜNDE */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; position: relative; background: url('bulls_start.jpg') center/cover no-repeat; z-index: 5; }
        #dashboard { display: none; width: 100vw; height: 100vh; position: relative; background: #000; z-index: 10; }
        #bg-dashboard { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 800px; max-width: 90%; opacity: 0.3; z-index: 1; }

        /* STARTSEITE ELEMENTE */
        #logo-main { width: 600px; max-width: 80%; filter: drop-shadow(0 0 30px red); }
        #loginBar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); background: #39d353; padding: 50px 15px; font-size: 22px; font-weight: bold; color: black; cursor: pointer; z-index: 100; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; }
        
        #side-menu { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        .info-btn { padding: 25px 12px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; font-family: 'Almendra'; writing-mode: vertical-rl; text-orientation: upright; border-radius: 10px 0 0 10px; width: 45px; }

        /* PANELS IM DASHBOARD - JETZT BOMBENFEST */
        .panel { position: absolute; background: rgba(20, 20, 20, 0.95); border: 2px solid #444; padding: 15px; z-index: 50; width: 280px; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        .panel h3 { color: #ff3131; margin: 0 0 10px 0; border-bottom: 1px solid #ff3131; padding-bottom: 5px; }
        .panel button { width: 100%; margin: 5px 0; background: #39d353; border: none; padding: 10px; font-family: 'Almendra'; font-weight: bold; cursor: pointer; font-size: 15px; }
        
        #panel-left { left: 30px; top: 80px; }
        #panel-right { right: 30px; top: 80px; border-color: #ffd600; display: none; } /* Admin Panel */
        #panel-bottom { left: 30px; bottom: 30px; width: 320px; display: none; } /* Suche */

        /* TOP NAV */
        #top-nav { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-sizing: border-box; z-index: 100; border-bottom: 1px solid #333; }
        .user-tag { color: #39d353; font-size: 18px; margin-right: 20px; }
        .logout { background: #d50000; color: white; border: none; padding: 8px 15px; cursor: pointer; font-family: 'Almendra'; font-weight: bold; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-box { background: #1a1a1a; padding: 30px; width: 350px; border: 2px solid #444; text-align: center; }
        .modal-box input { width: 100%; padding: 10px; margin-bottom: 15px; background: #000; color: #39d353; border: 1px solid #333; font-family: 'Almendra'; font-size: 18px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="start">
    <div id="loginBar" onclick="document.getElementById('pinModal').style.display='flex'">L O G I N</div>
    <img src="bulls_start.jpg" id="logo-main" onerror="this.style.display='none'; alert('Hintergrundbild fehlt!')">
    <div id="side-menu">
        <button class="info-btn" style="background:#ff8c00" onclick="window.open('https://www.youtube.com/@DarkBullsGruppe')">YOUTUBE</button>
        <button class="info-btn" style="background:#5b5bff; color:white">HISTORIES</button>
        <button class="info-btn" style="background:#00cfd1" onclick="window.open('https://darkbulls.jimdofree.com/')">INTERNET</button>
    </div>
</div>

<div id="pinModal" class="modal-overlay">
    <div class="modal-box">
        <h2 style="color:#ff3131">ANMELDUNG</h2>
        <input type="text" id="nameInput" placeholder="Name">
        <input type="password" id="pinInput" placeholder="PIN">
        <button onclick="attemptLogin()" style="width:100%; padding:10px; background:#39d353; border:none; cursor:pointer; font-family:'Almendra'; font-weight:bold;">LOGIN</button>
        <button onclick="document.getElementById('pinModal').style.display='none'" style="width:100%; margin-top:10px; background:transparent; color:gray; border:none; cursor:pointer;">Abbrechen</button>
    </div>
</div>

<div id="dashboard">
    <div id="top-nav">
        <div id="userInfo" class="user-tag">Lädt...</div>
        <button class="logout" onclick="location.reload()">LOGOUT</button>
    </div>
    <img src="bulls_dashboard.jpg" id="bg-dashboard">
    
    <div class="panel" id="panel-left">
        <h3>Mein Bereich</h3>
        <button id="alliDisplay">Allianz: -</button>
        <button onclick="alert('Statistik folgt')">Meine Statistik</button>
    </div>

    <div class="panel" id="panel-right">
        <h3 style="color:#ffd600">Admin-Panel</h3>
        <button style="background:#ffd600" onclick="adminReset()">PIN Reset</button>
        <button onclick="alert('Mitgliederliste')">Mitglieder</button>
    </div>

    <div class="panel" id="panel-bottom">
        <h3>FairPlay Suche</h3>
        <input type="text" id="searchName" placeholder="Spieler suchen..." style="width:100%; padding:8px; margin-bottom:10px; background:#000; color:#39d353; border:1px solid #444; box-sizing:border-box;">
        <button onclick="alert('Suche aktiv')">Prüfen</button>
    </div>
</div>

<script>
    const SHEET_ID = '1dc3akNMKE9pMP8HCqxleGzBo0kVc5IcYzFQQC2ENiSY';
    const GID = '598251300';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

    let users = [];

    async function init() {
        try {
            const res = await fetch(URL);
            const data = await res.text();
            const rows = data.split('\n').slice(1);
            users = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (s) => s ? s.replace(/["']/g, "").trim() : "";
                return { name: clean(c[0]), alli: clean(c[1]), pin: clean(c[2]), role: clean(c[3]) };
            });
        } catch (e) { console.log("Fehler Cloud"); }
    }

    function attemptLogin() {
        const uN = document.getElementById("nameInput").value.trim().toLowerCase();
        const uP = document.getElementById("pinInput").value.trim();
        const user = users.find(u => u.name.toLowerCase() === uN && u.pin === uP);

        if (user) {
            document.getElementById("start").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            document.getElementById("userInfo").innerText = user.name + " | " + user.role;
            document.getElementById("alliDisplay").innerText = "Allianz: " + user.alli;

            if (user.role === "Admin") {
                document.getElementById("panel-right").style.display = "block";
                document.getElementById("panel-bottom").style.display = "block";
            } else if (["Offizier", "Mitglied", "Ausbilder", "Elo"].includes(user.role)) {
                document.getElementById("panel-bottom").style.display = "block";
            }
        } else { alert("Falsch!"); }
    }

    function adminReset() {
        const t = prompt("Name:");
        if(t) alert("Reset für " + t + " bereit.");
    }

    window.onload = init;
</script>
</body>
</html>
