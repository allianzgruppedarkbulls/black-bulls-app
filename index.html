<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dark Bulls</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: white;
}

/* LOGIN SCREEN */
#loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

#loginBox {
    text-align: center;
}

#pinInput {
    padding: 15px;
    font-size: 20px;
    text-align: center;
    margin-top: 20px;
}

#loginBtn {
    margin-top: 20px;
    padding: 10px 30px;
    font-size: 18px;
    cursor: pointer;
    background: #39d353;
    border: none;
}

/* DASHBOARD */
#dashboard {
    display: none;
}

/* LOGIN BAR */
#loginBar {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #39d353;
    padding: 10px 40px;
    color: black;
    font-weight: bold;
}

/* LOGO */
#logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

#logo img {
    width: 600px;
    max-width: 80vw;
}

/* MENU */
#menu {
    position: absolute;
    bottom: 80px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 100px;
}

.btn {
    padding: 15px 40px;
    font-size: 20px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.youtube { background: orange; }
.story { background: #5b5bff; }
.web { background: #00cfd1; }
</style>

</head>

<body>

<!-- 🔐 LOGIN SCREEN -->
<div id="loginScreen">
    <div id="loginBox">
        <h1>Dark Bulls Login</h1>
        <input type="password" id="pinInput" placeholder="PIN eingeben">
        <br>
        <button id="loginBtn" onclick="login()">Einloggen</button>
    </div>
</div>

<!-- 🟢 DASHBOARD -->
<div id="dashboard">

<div id="loginBar">User</div>

<div id="logo">
    <img src="bulls.jpg">
</div>

<div id="menu">
    <button class="btn youtube" onclick="openYouTube()">YouTube</button>
    <button class="btn story" onclick="openStory()">Histories</button>
    <button class="btn web" onclick="openWeb()">Internet</button>
</div>

</div>

<script>

// 🔐 USER LISTE (HIER KOMMEN SPÄTER DEINE 40 LEUTE REIN)
let users = [
    { name: "Admin", pin: "1234", role: "Admin" },
    { name: "Support", pin: "2222", role: "Support" },
    { name: "Gast", pin: "0000", role: "Gast" }
];

// 🔐 LOGIN FUNKTION
function login() {
    let pin = document.getElementById("pinInput").value;

    let user = users.find(u => u.pin === pin);

    if (user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("loginBar").innerText =
            user.name + " (" + user.role + ")";
    } else {
        alert("Falscher PIN!");
    }
}

// LINKS
function openYouTube() {
    window.open("https://www.youtube.com/@DarkBullsGruppe", "_blank");
}

function openWeb() {
    window.open("https://darkbulls.jimdofree.com/", "_blank");
}

function openStory() {
    alert("Story kommt gleich als Fenster");
}

</script>

</body>
</html>
