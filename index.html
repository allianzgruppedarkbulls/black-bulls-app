<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Bulls - V13.9 Profi-System</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Almendra', serif; background: black; color: white; overflow-x: hidden; }
        
        /* DASHBOARD DESIGN */
        #start { display: flex; align-items: center; justify-content: center; height: 100vh; background: black; }
        #logo-container img { width: 780px; max-width: 75vw; filter: drop-shadow(0 0 50px red); }
        .side-bar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .bar-btn { padding: 30px 5px; font-weight: bold; color: black; cursor: pointer; border-radius: 0 10px 10px 0; writing-mode: vertical-rl; text-orientation: upright; width: 45px; text-align: center; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; z-index: 9000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .dark-modal { background: #111; border: 2px solid #444; padding: 25px; width: 500px; max-width: 95vw; border-radius: 10px; text-align: center; box-shadow: 0 0 30px rgba(255,0,0,0.3); }
        .dark-modal input, .dark-modal select, .dark-modal textarea { width: 100%; padding: 10px; margin: 8px 0; background: #000; color: #39d353; border: 1px solid #333; font-family: 'Almendra'; font-size: 16px; box-sizing: border-box; }

        /* PROFI-GRID BLACKLIST */
        .bl-container { width: 98vw; height: 90vh; background: #0a0a0a; border: 2px solid #333; display: flex; flex-direction: column; overflow: hidden; }
        .bl-header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ff3131; }
        .bl-table-wrapper { flex: 1; overflow: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #222; color: #ff3131; position: sticky; top: 0; padding: 12px; border: 1px solid #333; }
        td { padding: 10px; border: 1px solid #222; text-align: center; }
        tr:nth-child(even) { background: #0f0f0f; }
        tr:hover { background: #1a1a1a; color: #39d353; }

        /* DASHBOARD */
        #dashboard { display: none; min-height: 100vh; background: url('bulls_dashboard.jpg') no-repeat center center fixed; background-size: cover; }
        .panel { background: rgba(0,0,0,0.85); border: 1px solid #444; padding: 15px; border-radius: 8px; width: 250px; position: absolute; }
        .panel h2 { color: #ff3131; margin-top: 0; text-align: center; border-bottom: 1px solid #444; }
        .panel button { width: 100%; padding: 8px; margin: 4px 0; font-family: 'Almendra'; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
        
        #personal { left: 30px; top: 80px; }
        #blacklistPanel { left: 30px; top: 320px; }
        #blacklistAdmin { left: 30px; bottom: 40px; width: 450px; }
        #admin { right: 30px; top: 80px; }
        
        .role-badge { position: fixed; top: 10px; right: 20px; color: #ff3131; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="start">
    <div class="side-bar">
        <div class="bar-btn" style="background:#39d353;" onclick="openLogin()">LOGIN</div>
        <div class="bar-btn" style="background:#ffd600;" onclick="alert('Registrierung folgt')">REG</div>
    </div>
    <div id="logo-container"><img src="bulls_start.jpg"></div>
</div>

<div id="dashboard">
    <div class="role-badge"><span id="uName"></span> | <span id="uRole"></span></div>
    
    <div class="panel" id="personal">
        <h2>Persönlich</h2>
        <button style="background:#39d353">Support Chat</button>
        <button style="background:#39d353">Pin ändern</button>
    </div>

    <div class="panel" id="blacklistPanel">
        <h2>Black Liste</h2>
        <button style="background:#ff3131; color:white;" onclick="openProfiBlacklist()">Anschauen (Grid)</button>
        <button style="background:#ff8c00;" onclick="openReportForm()">Spieler Melden</button>
    </div>

    <div class="panel" id="blacklistAdmin">
        <h2>Pflege Admin</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <button id="btnGemeldet" style="background:#5b5bff; color:white; display:none;" onclick="openReportedList()">Gemeldete</button>
            <button style="background:#ffd600;">Pflege</button>
            <button style="background:#39d353;">Eintragen</button>
            <button style="background:#fff; color:black;" onclick="openProfiBlacklist()">Vollansicht</button>
        </div>
    </div>

    <div class="panel" id="admin">
        <h2>Admin</h2>
        <button id="btnMgmt" style="background:#ffd600; display:none;">Gruppen Mgmt</button>
        <button style="background:#39d353;">User Verwaltung</button>
    </div>
</div>

<div id="blacklistModal" class="modal-overlay">
    <div class="bl-container">
        <div class="bl-header">
            <h1 style="margin:0; color:#ff3131;">DARK BULLS PROFI GRID</h1>
            <input type="text" id="blSearch" placeholder="Suchen..." style="width:300px; padding:10px; background:#000; color:#39d353; border:1px solid #444;" onkeyup="filterTable()">
            <button onclick="document.getElementById('blacklistModal').style.display='none'" style="background:red; color:white; padding:10px 20px; border:none; cursor:pointer;">SCHLIESSEN</button>
        </div>
        <div class="bl-table-wrapper">
            <table id="profiTable">
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Allianz</th><th>Verstoß</th><th>Punkte</th><th>Datum</th><th>Fall-Nr</th><th>Melder</th><th>Beweis</th>
                    </tr>
                </thead>
                <tbody id="blBody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="reportModal" class="modal-overlay">
    <div class="dark-modal">
        <h2 style="color:#ff8c00">Spieler Melden</h2>
        <input type="text" id="repName" placeholder="Spieler Name">
        <input type="text" id="repAlly" placeholder="Allianz">
        <select id="repReason">
            <option value="">-- Grund wählen --</option>
            <option value="Beleidigung">Beleidigung</option>
            <option value="Multi-Account">Multi-Account</option>
            <option value="Spionage">Spionage</option>
            <option value="Anderes">Anderes</option>
        </select>
        <textarea id="repStory" placeholder="Was ist passiert?"></textarea>
        <input type="text" id="repProof" placeholder="Beweis Link (Bild/Video)">
        <button style="background:#39d353; padding:15px;" onclick="submitReport()">MELDUNG ABSENDEN</button>
        <button style="background:red; color:white; margin-top:5px;" onclick="document.getElementById('reportModal').style.display='none'">ABBRUCH</button>
    </div>
</div>

<div id="loginModal" class="modal-overlay">
    <div class="dark-modal">
        <h1>Anmeldung</h1>
        <input type="text" id="loginName" placeholder="Name">
        <input type="password" id="loginPin" placeholder="PIN">
        <button onclick="doLogin()" style="background:#39d353; padding:15px; width:100%;">LOGIN</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlZWpYkINjQsh72hVecR_2KRZ66ff7aKnc7tZHqKbKezTQHeyjkv1NE3L6_GIgiU7WTA/exec';
    const SHEET_ID = '1Gjnhol0ou63xW20OnbTo_wugzpOTgBP2yjnx3Qzg4bQ';
    
    let currentUser = null;
    let blacklistData = [];

    async function doLogin() {
        // ... (Login Logik wie gehabt)
        // Nach Login Check der Rollen:
        const name = document.getElementById('loginName').value;
        const pin = document.getElementById('loginPin').value;
        
        // Simulierter Check (wird durch fetch ersetzt)
        currentUser = { name: name, role: "Admin" }; // Nur Test
        
        document.getElementById('uName').innerText = currentUser.name;
        document.getElementById('uRole').innerText = currentUser.role;
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('start').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';

        // BUCHHALTER / ADMIN RECHTE
        if(currentUser.role === "Admin" || currentUser.role === "Buchhalter") {
            document.getElementById('btnGemeldet').style.display = 'block';
        }
        if(currentUser.role === "Admin") {
            document.getElementById('btnMgmt').style.display = 'block';
        }
    }

    function openLogin() { document.getElementById('loginModal').style.display='flex'; }
    function openReportForm() { document.getElementById('reportModal').style.display='flex'; }

    async function submitReport() {
        const data = {
            action: "reportPlayer",
            name: document.getElementById('repName').value,
            ally: document.getElementById('repAlly').value,
            reason: document.getElementById('repReason').value,
            story: document.getElementById('repStory').value,
            proof: document.getElementById('repProof').value,
            reporter: currentUser.name
        };
        await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
        alert("Meldung wurde an die Administration gesendet!");
        document.getElementById('reportModal').style.display='none';
    }

    async function openProfiBlacklist() {
        document.getElementById('blacklistModal').style.display = 'flex';
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1767725514`);
        const text = await res.text();
        const rows = text.split('\n').slice(1);
        let html = "";
        rows.forEach(r => {
            const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g,""));
            html += `<tr>
                <td>${c[1]}</td><td>${c[2]}</td><td>${c[5]}</td><td>${c[6]}</td>
                <td>${c[16]}</td><td>${c[14]}</td><td>${c[12]}</td><td>${c[7]}</td><td><a href="${c[15]}" target="_blank">🔗</a></td>
            </tr>`;
        });
        document.getElementById('blBody').innerHTML = html;
    }

    function filterTable() {
        let input = document.getElementById("blSearch").value.toLowerCase();
        let rows = document.getElementById("blBody").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            rows[i].style.display = rows[i].innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }

    // PFLEGE ADMIN: GEMELDETE AUFRUFEN (Wird über GID 1599277949 geladen)
    async function openReportedList() {
        alert("Lade gemeldete Fälle aus der Gegenliste...");
        // Hier Fetch auf GID 1599277949
        // Logik zum Bearbeiten und "Hübsch Speichern" mit Fallnummer-Spiegelung
    }
</script>
</body>
</html>
